/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BUTTONS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  font-family:var(--fhd);font-weight:700;font-size:.56rem;
  border-radius:var(--r-sm);cursor:pointer;border:1px solid transparent;
  padding:10px 16px;letter-spacing:.5px;
  transition:all .15s cubic-bezier(.22,.68,0,1.2);
  white-space:nowrap;position:relative;overflow:hidden;
  -webkit-user-select:none;user-select:none;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.07),rgba(255,255,255,0));
  pointer-events:none;border-radius:inherit;
}
.btn:active{transform:scale(0.93)!important}

.btn-g{background:var(--grad-g)!important;color:#000!important;box-shadow:0 2px 16px rgba(14,203,129,0.35)!important;border-color:transparent!important}
.btn-r{background:var(--grad-r)!important;color:#fff!important;box-shadow:0 2px 16px rgba(246,70,93,0.3)!important;border-color:transparent!important}
.btn-a{background:var(--grad-a)!important;color:#fff!important;box-shadow:0 2px 16px rgba(79,142,247,0.35)!important;border-color:transparent!important}
.btn-p{background:linear-gradient(135deg,#7c5df7,#9f7aea)!important;color:#fff!important;box-shadow:0 2px 16px rgba(124,93,247,0.35)!important;border-color:transparent!important}
.btn-y,.btn-gold{background:var(--grad-gold)!important;color:#000!important;box-shadow:0 2px 16px rgba(232,184,75,0.3)!important;border-color:transparent!important}
.btn-gh{background:rgba(255,255,255,0.06)!important;color:var(--t2)!important;border:1px solid rgba(255,255,255,0.09)!important}
.btn-gh:hover{background:rgba(255,255,255,0.1)!important}
.btn-sm{padding:6px 10px!important;font-size:.48rem!important;border-radius:6px!important;gap:4px!important}
.btn-w,.btn-blk{width:100%;display:flex}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TAB BARS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.tab-bar{
  display:flex;gap:2px;background:rgba(255,255,255,0.03);
  border-radius:var(--r-sm);padding:3px;
  border:1px solid rgba(255,255,255,0.06);
}
.tab{
  flex:1;text-align:center;padding:8px 6px;
  font-family:var(--fhd);font-size:.5rem;font-weight:700;
  border-radius:5px;color:var(--t3);cursor:pointer;
  transition:all .15s;letter-spacing:.3px;
}
.tab.active{
  background:rgba(79,142,247,0.14);color:var(--a);
  box-shadow:inset 0 0 0 1px rgba(79,142,247,0.2);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   OVERLAYS / SHEETS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.ov{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  z-index:1000;display:none;align-items:flex-end;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.ov.open{display:flex;animation:ovIn .2s ease both}
@keyframes ovIn{from{opacity:0}to{opacity:1}}
.ov-sh{
  width:100%;
  background:var(--s1);
  border-radius:20px 20px 0 0;
  border-top:1px solid rgba(255,255,255,0.1);
  box-shadow:0 -20px 60px rgba(0,0,0,0.8);
  animation:sheetUp .28s cubic-bezier(.22,.68,0,1.2) both;
  max-height:92vh;overflow-y:auto;
}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ov-hdl{
  width:40px;height:3px;background:rgba(255,255,255,0.12);
  border-radius:2px;margin:12px auto 14px;
}
.ov-title{
  font-family:var(--fhd);font-size:.72rem;font-weight:900;
  color:var(--t1);letter-spacing:1px;
  padding:0 16px 14px;border-bottom:1px solid var(--br2);
}
.ov-pad{padding:16px}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   POPUPS / TOASTS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.popup-box{
  background:var(--s2);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  box-shadow:var(--sh-xl),0 0 0 1px rgba(255,255,255,0.05);
  animation:popIn .25s cubic-bezier(.22,.68,0,1.6) both;
}
@keyframes popIn{from{opacity:0;transform:scale(0.85) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TRADE PAGE — Exchange grade
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.t-price-big{
  font-family:var(--fmono);font-size:clamp(1.6rem,8vw,2.4rem);
  font-weight:800;letter-spacing:-1px;
  transition:color .3s,text-shadow .3s;
}
.t-price-big.up{color:var(--green);text-shadow:0 0 30px rgba(14,203,129,0.4)}
.t-price-big.dn{color:var(--red);text-shadow:0 0 30px rgba(246,70,93,0.4)}

#t-dir-up,#t-dir-dn{
  border-radius:10px!important;height:52px!important;
  font-family:var(--fhd)!important;font-size:.68rem!important;font-weight:900!important;
  transition:all .18s cubic-bezier(.22,.68,0,1.2)!important;
  letter-spacing:1px!important;
}
#t-dir-up{background:var(--green-dim)!important;border:1px solid rgba(14,203,129,0.25)!important;color:var(--green)!important}
#t-dir-up.active{background:var(--grad-g)!important;color:#000!important;border-color:transparent!important;box-shadow:0 4px 24px rgba(14,203,129,0.45)!important;transform:scale(1.02)!important}
#t-dir-dn{background:var(--red-dim)!important;border:1px solid rgba(246,70,93,0.25)!important;color:var(--red)!important}
#t-dir-dn.active{background:var(--grad-r)!important;color:#fff!important;border-color:transparent!important;box-shadow:0 4px 24px rgba(246,70,93,0.45)!important;transform:scale(1.02)!important}

#t-place-btn{
  background:var(--grad-a)!important;color:#fff!important;
  font-family:var(--fhd)!important;font-size:.76rem!important;font-weight:900!important;
  height:56px!important;border-radius:12px!important;border:none!important;
  letter-spacing:2px!important;
  box-shadow:0 4px 24px rgba(79,142,247,0.45),0 0 0 1px rgba(79,142,247,0.2)!important;
  transition:all .18s cubic-bezier(.22,.68,0,1.2)!important;
}
#t-place-btn:active{transform:scale(0.96)!important;box-shadow:0 2px 12px rgba(79,142,247,0.3)!important}
#t-chart-wrap{
  border-radius:10px!important;overflow:hidden!important;
  border:1px solid rgba(255,255,255,0.06)!important;
  background:#04060e!important;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HOME PAGE — Dashboard feel
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.home-hero{
  margin:10px;padding:16px;
  background:linear-gradient(135deg,rgba(79,142,247,0.1),rgba(124,93,247,0.06),rgba(0,0,0,0));
  border:1px solid rgba(79,142,247,0.15);
  border-radius:16px;
}
#hbal-total{
  font-family:var(--fmono);font-size:clamp(1.8rem,8vw,2.6rem);
  font-weight:800;color:var(--t1);letter-spacing:-1px;
  transition:all .3s ease;
}
.hh-stat{
  font-family:var(--fhd);font-size:.44rem;
  color:var(--t3);font-weight:700;letter-spacing:.5px;
}

/* Quick action icons */
.qi{
  background:var(--s1)!important;
  border:1px solid var(--br)!important;
  border-radius:14px!important;
  transition:all .18s cubic-bezier(.22,.68,0,1.2)!important;
  aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.qi:active{transform:scale(0.88)!important;background:var(--a-dim)!important;border-color:var(--br-a)!important}

/* Market rows */
.mkt-row{
  border-radius:10px!important;
  transition:background .12s,transform .12s!important;
}
.mkt-row:active{background:rgba(79,142,247,0.06)!important;transform:scale(0.99)!important}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   WALLET BUTTONS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.w-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  background:var(--s1)!important;border:1px solid var(--br)!important;
  border-radius:12px!important;padding:12px 8px!important;
  cursor:pointer;color:var(--t2)!important;
  font-family:var(--fhd)!important;font-size:.44rem!important;font-weight:700!important;
  transition:all .18s cubic-bezier(.22,.68,0,1.2)!important;
}
.w-btn:active{transform:scale(0.93)!important;background:var(--a-dim)!important;border-color:var(--br-a)!important;color:var(--a)!important}
.w-btns{display:flex;gap:8px;padding:10px}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   STATUS / BADGES
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.up,.chg-up{color:var(--green)!important;font-weight:700!important}
.dn,.chg-dn{color:var(--red)!important;font-weight:700!important}
.badge{
  display:inline-flex;align-items:center;gap:4px;
  border-radius:6px;padding:3px 8px;
  font-family:var(--fhd);font-size:.42rem;font-weight:700;
}
.badge-g{background:var(--green-dim);color:var(--green);border:1px solid rgba(14,203,129,0.2)}
.badge-r{background:var(--red-dim);color:var(--red);border:1px solid rgba(246,70,93,0.2)}
.badge-a{background:var(--a-dim);color:var(--a);border:1px solid rgba(79,142,247,0.2)}
.badge-gold{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(232,184,75,0.2)}
.mcap-badge{background:var(--a-dim);border:1px solid rgba(79,142,247,0.2);border-radius:6px;padding:2px 7px;font-family:var(--fmono);font-size:.44rem;color:var(--a);font-weight:600}
.blockchain-badge{background:rgba(124,93,247,0.1);border:1px solid rgba(124,93,247,0.2);border-radius:6px;padding:2px 7px;font-family:var(--fmono);font-size:.44rem;color:var(--purple);font-weight:600}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   AUTH SCREEN
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.auth-card{
  background:rgba(8,13,24,0.9);
  border:1px solid rgba(79,142,247,0.15);
  border-radius:18px;padding:22px;
  backdrop-filter:blur(20px);
  box-shadow:var(--sh-xl);
}
.a-tabs{display:flex;background:rgba(255,255,255,0.04);border-radius:9px;padding:3px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.07)}
.a-tab{flex:1;text-align:center;padding:9px;font-family:var(--fhd);font-size:.54rem;font-weight:700;cursor:pointer;border-radius:7px;color:var(--t3);transition:.2s;letter-spacing:1px}
.a-tab.on{background:rgba(79,142,247,0.14);color:var(--a);border:1px solid rgba(79,142,247,0.25)}
.a-inp{width:100%;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.09);border-radius:9px;padding:13px 15px;color:var(--t1);font-size:.82rem;outline:none;transition:.2s;font-family:var(--fmono)}
.a-inp:focus{border-color:rgba(79,142,247,0.5);box-shadow:0 0 0 3px rgba(79,142,247,0.08);background:rgba(79,142,247,0.04)}
.btn-auth{width:100%;background:var(--grad-a);color:#fff;border:none;border-radius:10px;padding:14px;font-family:var(--fhd);font-size:.66rem;font-weight:900;cursor:pointer;letter-spacing:2px;margin-bottom:10px;box-shadow:0 4px 20px rgba(79,142,247,0.4);transition:.15s}
.btn-auth:active{transform:scale(0.97);opacity:.9}
.btn-auth-ghost{width:100%;background:rgba(255,255,255,0.05);color:var(--t1);border:1px solid rgba(255,255,255,0.09);border-radius:10px;padding:12px;font-family:var(--font);font-size:.75rem;cursor:pointer;transition:.15s}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MISC UTILITY
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.empty{
  padding:40px 20px;text-align:center;
  color:var(--t3);font-size:.62rem;font-family:var(--fhd);
  letter-spacing:.5px;
}
.stat-box{background:rgba(255,255,255,0.03);border:1px solid var(--br);border-radius:8px;padding:10px}
.stat-v{font-family:var(--fmono);font-size:1.1rem;font-weight:700;color:var(--t1);letter-spacing:-0.5px}
.stat-l{font-family:var(--fhd);font-size:.42rem;color:var(--t3);letter-spacing:.5px;margin-top:2px}

/* Page titles */
.page-title{
  display:flex;align-items:center;gap:8px;
  padding:16px 14px 12px;
  font-family:var(--fhd);font-size:.72rem;font-weight:900;
  color:var(--t1);letter-spacing:1px;
  border-bottom:1px solid var(--br2);
}
/* Section dividers */
.divider{height:1px;background:var(--br);margin:12px 0}

/* Notification badge */
#notif-badge{
  position:absolute;top:4px;right:4px;width:8px;height:8px;
  background:var(--red);border-radius:50%;display:none;
  animation:notifPulse 1.5s ease-in-out infinite;
  box-shadow:0 0 6px rgba(246,70,93,0.6);
}
@keyframes notifPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

/* Live dot */
.live-dot{
  width:6px;height:6px;border-radius:50%;background:var(--green);
  display:inline-block;animation:liveBlink 1.4s ease-in-out infinite;
  box-shadow:0 0 4px rgba(14,203,129,0.6);
}
@keyframes liveBlink{0%,100%{opacity:1}50%{opacity:0.3}}

/* Skeleton loader */
.skel{
  background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);
  background-size:200% 100%;
  animation:skelShimmer 1.4s infinite;
  border-radius:6px;
}
@keyframes skelShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Number font */
.mono{font-family:var(--fmono);font-variant-numeric:tabular-nums;letter-spacing:-0.3px}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PASS CARDS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
[class*=pass-card]{border-radius:14px!important}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   DURATION PILLS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.t-dur,[class*=dur-btn]{
  border-radius:8px!important;font-family:var(--fhd)!important;font-size:.5rem!important;
  font-weight:700!important;background:rgba(255,255,255,0.04)!important;
  border:1px solid var(--br)!important;color:var(--t3)!important;
  transition:all .15s!important;padding:7px 10px!important;
}
.t-dur.active,[class*=dur-btn].active{
  background:var(--a-dim)!important;border-color:rgba(79,142,247,0.35)!important;
  color:var(--a)!important;box-shadow:0 0 10px rgba(79,142,247,0.15)!important;
}


/* ╔══════════════════════════════════════════════════════════╗
   ║   ZENITHCRYPTO v22 — ULTRA CINEMATIC EDITION            ║
   ║   Full neon. Full depth. Maximum dopamine.              ║
   ╚══════════════════════════════════════════════════════════╝ */

/* ── Premium root overrides ── */
:root{
  --bg:#030508;--s1:#07090f;--s2:#0b0e17;--s3:#10141f;--s4:#161c2d;
  --a:#5b9bff;--a2:#82b4ff;--a-dim:rgba(91,155,255,0.12);
  --green:#00d68f;--green-dim:rgba(0,214,143,0.1);
  --red:#ff3b5c;--red-dim:rgba(255,59,92,0.1);
  --gold:#f5c842;--gold2:#ffe066;--gold-dim:rgba(245,200,66,0.12);
  --purple:#9b6dff;--purple-dim:rgba(155,109,255,0.1);
  --cyan:#00e8ff;--orange:#ff9500;
  --t1:#f0f3ff;--t2:#6474a0;--t3:#252e47;--t4:#141928;
  --r:12px;--r-sm:8px;--r-lg:18px;--r-xl:24px;
  --topH:56px;--navH:66px;
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --fhd:'Orbitron',monospace;
  --fmono:'JetBrains Mono','Courier New',monospace;
}

/* ── Smoother everything ── */
*{transition-timing-function:cubic-bezier(.22,.68,0,1.2)}
.page,nav,#topbar,#ticker-wrap{transition-timing-function:ease!important}

/* ══════════════════════════════════════════════
   LOADING SCREEN — Hollywood level
══════════════════════════════════════════════ */
#ld{
  background:
    radial-gradient(ellipse 120% 70% at 50% -10%,rgba(91,155,255,0.22),transparent 55%),
    radial-gradient(ellipse 80% 80% at 100% 120%,rgba(155,109,255,0.16),transparent 55%),
    radial-gradient(ellipse 60% 60% at -10% 80%,rgba(0,232,255,0.08),transparent 50%),
    #030508!important;
}
#ld-cv{position:absolute;inset:0;pointer-events:none}
.ld-logo-wrap{
  filter:drop-shadow(0 0 30px rgba(91,155,255,0.7)) drop-shadow(0 0 80px rgba(91,155,255,0.25)) drop-shadow(0 0 120px rgba(155,109,255,0.15))!important;
  animation:ldFloat 4s ease-in-out infinite!important;
}
@keyframes ldFloat{
  0%,100%{transform:translateY(0) rotate(0deg) scale(1)}
  33%{transform:translateY(-12px) rotate(1deg) scale(1.02)}
  66%{transform:translateY(-6px) rotate(-0.5deg) scale(1.01)}
}
.ld-brand{
  font-size:2rem!important;letter-spacing:8px!important;
  background:linear-gradient(135deg,#fff 0%,#c8d8ff 30%,#9b6dff 60%,#5b9bff 100%)!important;
  -webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;
  background-clip:text!important;
  text-shadow:none!important;
  filter:drop-shadow(0 0 20px rgba(91,155,255,0.5));
}
.ld-brand-accent{
  background:linear-gradient(135deg,#5b9bff,#9b6dff,#f5c842)!important;
  -webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;
  background-clip:text!important;
}
.ld-tagline{color:rgba(255,255,255,0.25)!important;letter-spacing:8px!important;font-size:.4rem!important}
.ld-track{
  width:260px!important;height:3px!important;
  background:rgba(255,255,255,0.05)!important;
  border-radius:3px!important;
  box-shadow:0 0 10px rgba(91,155,255,0.15);
}
#ldf{
  background:linear-gradient(90deg,#5b9bff,#9b6dff,#f5c842)!important;
  box-shadow:0 0 12px rgba(91,155,255,0.8),0 0 30px rgba(155,109,255,0.4)!important;
}

/* ══════════════════════════════════════════════
   TOP BAR — Premium glass dock
══════════════════════════════════════════════ */
#topbar{
  height:var(--topH)!important;
  background:rgba(3,5,8,0.92)!important;
  border-bottom:1px solid rgba(91,155,255,0.12)!important;
  backdrop-filter:blur(32px) saturate(200%)!important;
  -webkit-backdrop-filter:blur(32px) saturate(200%)!important;
  box-shadow:0 1px 0 rgba(91,155,255,0.08),0 4px 24px rgba(0,0,0,0.5)!important;
}
.tb-brand{
  font-size:.74rem!important;letter-spacing:2px!important;
  background:linear-gradient(135deg,#fff 0%,#c8d8ff 60%)!important;
  -webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;
}
.tb-brand span{
  background:linear-gradient(135deg,#5b9bff,#9b6dff)!important;
  -webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;
}
#hbal{
  font-family:var(--fmono)!important;font-size:.92rem!important;font-weight:800!important;
  background:linear-gradient(135deg,#f5c842,#ffe066)!important;
  -webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;
  filter:drop-shadow(0 0 8px rgba(245,200,66,0.3));
}
#hlv{
  background:linear-gradient(135deg,#5b9bff,#9b6dff)!important;
  box-shadow:0 2px 12px rgba(91,155,255,0.4)!important;
  font-size:.42rem!important;
}

/* ══════════════════════════════════════════════
   TICKER — Bloomberg style
══════════════════════════════════════════════ */
#ticker-wrap{
  background:rgba(3,5,8,0.98)!important;
  border-bottom:1px solid rgba(91,155,255,0.08)!important;
  overflow:hidden;
}
#ticker{animation:tickerScroll 35s linear infinite!important}
#ticker:hover{animation-play-state:paused!important}
.ti{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 16px;
  border-right:1px solid rgba(255,255,255,0.04)!important;
  font-size:.5rem!important;
}
.ti-s{font-family:var(--fmono)!important;font-weight:700!important;color:var(--t2)!important;font-size:.5rem!important}
.ti span:nth-child(2){font-family:var(--fmono)!important;font-weight:600!important}

/* ══════════════════════════════════════════════
   NAVIGATION — Floating glass pill
══════════════════════════════════════════════ */
#nav{
  height:var(--navH)!important;
  background:rgba(3,5,8,0.96)!important;
  border-top:1px solid rgba(91,155,255,0.1)!important;
  backdrop-filter:blur(32px) saturate(200%)!important;
  -webkit-backdrop-filter:blur(32px) saturate(200%)!important;
  box-shadow:0 -1px 0 rgba(91,155,255,0.08),0 -8px 40px rgba(0,0,0,0.5)!important;
}
.ni{
  color:rgba(100,116,160,0.6)!important;
  font-family:var(--fhd)!important;
  font-size:.34rem!important;font-weight:700!important;
  letter-spacing:.5px!important;
  border-radius:14px!important;
  padding:7px 4px!important;
  transition:all .2s cubic-bezier(.22,.68,0,1.6)!important;
}
.ni.active{
  color:var(--a)!important;
  background:rgba(91,155,255,0.1)!important;
  text-shadow:0 0 12px rgba(91,155,255,0.6)!important;
}
.ni.active::before{
  content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);
  width:24px;height:2.5px;
  background:linear-gradient(90deg,#5b9bff,#9b6dff);
  border-radius:0 0 4px 4px;
  box-shadow:0 0 12px rgba(91,155,255,0.9),0 0 30px rgba(91,155,255,0.4)!important;
}
.ni.active svg{
  filter:drop-shadow(0 0 8px rgba(91,155,255,0.8)) drop-shadow(0 0 20px rgba(91,155,255,0.3))!important;
  transform:scale(1.15)!important;
}
.ni:active{transform:scale(0.82)!important}
.ni-lbl{font-size:.33rem!important;letter-spacing:.5px!important}

/* ══════════════════════════════════════════════
   PAGE TRANSITIONS
══════════════════════════════════════════════ */
@keyframes pgIn{
  from{opacity:0;transform:translateY(16px) scale(0.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.page.active{animation:pgIn .28s cubic-bezier(.22,.68,0,1.2) both!important}

/* ══════════════════════════════════════════════
   CARDS — Deep glass with subtle light
══════════════════════════════════════════════ */
.sec,.card{
  background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01))!important;
  border:1px solid rgba(255,255,255,0.08)!important;
  border-radius:var(--r-lg)!important;
  box-shadow:0 4px 24px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.06)!important;
  position:relative;overflow:hidden;
  transition:border-color .2s,box-shadow .2s,transform .2s!important;
}
.sec::before,.card::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,transparent 50%);
  border-radius:inherit;
}
.card:active{transform:scale(0.99)!important;border-color:rgba(91,155,255,0.2)!important}

/* ══════════════════════════════════════════════
   INPUTS
══════════════════════════════════════════════ */
.inp{
  background:rgba(255,255,255,0.04)!important;
  border:1.5px solid rgba(255,255,255,0.08)!important;
  border-radius:10px!important;
  color:var(--t1)!important;
  font-family:var(--fmono)!important;font-size:.72rem!important;
  padding:12px 14px!important;
  transition:all .18s!important;
}
.inp:focus{
  border-color:rgba(91,155,255,0.5)!important;
  background:rgba(91,155,255,0.05)!important;
  box-shadow:0 0 0 4px rgba(91,155,255,0.08),0 0 20px rgba(91,155,255,0.1)!important;
  outline:none!important;
}
.inp::placeholder{color:rgba(100,116,160,0.5)!important}

/* ══════════════════════════════════════════════
   BUTTONS — Premium with glow
══════════════════════════════════════════════ */
.btn{
  font-family:var(--fhd)!important;font-weight:700!important;
  border-radius:10px!important;letter-spacing:.5px!important;
  transition:all .18s cubic-bezier(.22,.68,0,1.6)!important;
  position:relative;overflow:hidden;
}
.btn::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
  transition:left .4s ease;pointer-events:none;
}
.btn:active{transform:scale(0.91)!important}
.btn:active::before{left:100%}
.btn-g{
  background:linear-gradient(135deg,#00d68f,#00b87a)!important;color:#000!important;
  box-shadow:0 4px 20px rgba(0,214,143,0.4),0 0 0 1px rgba(0,214,143,0.2)!important;
  border-color:transparent!important;
}
.btn-g:active{box-shadow:0 2px 8px rgba(0,214,143,0.3)!important}
.btn-r{
  background:linear-gradient(135deg,#ff3b5c,#d42041)!important;color:#fff!important;
  box-shadow:0 4px 20px rgba(255,59,92,0.4),0 0 0 1px rgba(255,59,92,0.2)!important;
  border-color:transparent!important;
}
.btn-a{
  background:linear-gradient(135deg,#5b9bff,#7c5df7)!important;color:#fff!important;
  box-shadow:0 4px 20px rgba(91,155,255,0.4),0 0 0 1px rgba(91,155,255,0.2)!important;
  border-color:transparent!important;
}
.btn-p{
  background:linear-gradient(135deg,#9b6dff,#c471f5)!important;color:#fff!important;
  box-shadow:0 4px 20px rgba(155,109,255,0.4)!important;border-color:transparent!important;
}
.btn-y,.btn-gold{
  background:linear-gradient(135deg,#f5c842,#ffe066)!important;color:#000!important;
  box-shadow:0 4px 20px rgba(245,200,66,0.4),0 0 0 1px rgba(245,200,66,0.2)!important;
  border-color:transparent!important;
}
.btn-gh{
  background:rgba(255,255,255,0.06)!important;color:var(--t2)!important;
  border:1px solid rgba(255,255,255,0.09)!important;
  backdrop-filter:blur(8px)!important;
}
.btn-gh:active{background:rgba(91,155,255,0.1)!important;color:var(--a)!important}

/* ══════════════════════════════════════════════
   OVERLAYS & SHEETS
══════════════════════════════════════════════ */
.ov{
  background:rgba(0,0,0,0.75)!important;
  backdrop-filter:blur(8px)!important;-webkit-backdrop-filter:blur(8px)!important;
}
.ov-sh{
  background:linear-gradient(180deg,var(--s2) 0%,var(--s1) 100%)!important;
  border-radius:24px 24px 0 0!important;
  border-top:1px solid rgba(91,155,255,0.15)!important;
  box-shadow:0 -20px 80px rgba(0,0,0,0.8),inset 0 1px 0 rgba(255,255,255,0.08)!important;
}

/* ══════════════════════════════════════════════
   POPUPS — Spring bounce
══════════════════════════════════════════════ */
@keyframes popIn{
  0%{opacity:0;transform:scale(0.7) translateY(30px)}
  60%{transform:scale(1.05) translateY(-4px)}
  80%{transform:scale(0.98) translateY(1px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
.popup-box{
  background:linear-gradient(135deg,rgba(11,14,23,0.98),rgba(7,9,15,0.98))!important;
  border:1px solid rgba(91,155,255,0.2)!important;
  border-radius:22px!important;
  box-shadow:0 24px 80px rgba(0,0,0,0.9),0 0 0 1px rgba(255,255,255,0.05),inset 0 1px 0 rgba(255,255,255,0.08)!important;
  animation:popIn .45s cubic-bezier(.22,.68,0,1.2) both!important;
  backdrop-filter:blur(20px)!important;
}

/* Toast notifications */
.toast-item{
  border-radius:14px!important;
  backdrop-filter:blur(20px)!important;
  box-shadow:0 8px 32px rgba(0,0,0,0.6)!important;
  border:1px solid rgba(255,255,255,0.1)!important;
  font-family:var(--fhd)!important;
}

/* ══════════════════════════════════════════════
   TRADE PAGE — Binance Pro level
══════════════════════════════════════════════ */
.t-price-big{
  font-family:var(--fmono)!important;
  font-size:clamp(1.8rem,9vw,2.6rem)!important;
  font-weight:900!important;letter-spacing:-1.5px!important;
  transition:color .3s,filter .3s!important;
}
.t-price-big.up{color:var(--green)!important;filter:drop-shadow(0 0 20px rgba(0,214,143,0.5))!important}
.t-price-big.dn{color:var(--red)!important;filter:drop-shadow(0 0 20px rgba(255,59,92,0.5))!important}
@keyframes priceFlash{0%{background:rgba(0,214,143,0.3)}100%{background:transparent}}
@keyframes priceFlashDn{0%{background:rgba(255,59,92,0.3)}100%{background:transparent}}

#t-dir-up,#t-dir-dn{
  border-radius:12px!important;height:56px!important;
  font-family:var(--fhd)!important;font-size:.7rem!important;font-weight:900!important;
  letter-spacing:1.5px!important;
  transition:all .2s cubic-bezier(.22,.68,0,1.6)!important;
}
#t-dir-up{
  background:rgba(0,214,143,0.08)!important;
  border:1.5px solid rgba(0,214,143,0.2)!important;color:var(--green)!important;
}
#t-dir-up.active{
  background:linear-gradient(135deg,#00d68f,#00b87a)!important;color:#000!important;
  border-color:transparent!important;
  box-shadow:0 6px 30px rgba(0,214,143,0.5),0 0 60px rgba(0,214,143,0.2)!important;
  transform:scale(1.03)!important;
}
#t-dir-dn{
  background:rgba(255,59,92,0.08)!important;
  border:1.5px solid rgba(255,59,92,0.2)!important;color:var(--red)!important;
}
#t-dir-dn.active{
  background:linear-gradient(135deg,#ff3b5c,#d42041)!important;color:#fff!important;
  border-color:transparent!important;
  box-shadow:0 6px 30px rgba(255,59,92,0.5),0 0 60px rgba(255,59,92,0.2)!important;
  transform:scale(1.03)!important;
}
#t-place-btn{
  background:linear-gradient(135deg,#5b9bff,#9b6dff)!important;color:#fff!important;
  font-family:var(--fhd)!important;font-size:.8rem!important;font-weight:900!important;
  height:60px!important;border-radius:14px!important;border:none!important;
  letter-spacing:2px!important;
  box-shadow:0 6px 30px rgba(91,155,255,0.5),0 0 60px rgba(155,109,255,0.2),inset 0 1px 0 rgba(255,255,255,0.2)!important;
  transition:all .2s cubic-bezier(.22,.68,0,1.4)!important;
}
#t-place-btn:active{
  transform:scale(0.94)!important;
  box-shadow:0 2px 12px rgba(91,155,255,0.3)!important;
}

/* Duration pills */
.t-dur,[class*=dur-btn]{
  border-radius:8px!important;
  background:rgba(255,255,255,0.04)!important;
  border:1px solid rgba(255,255,255,0.07)!important;
  color:var(--t3)!important;
  transition:all .18s!important;
  font-family:var(--fhd)!important;font-size:.48rem!important;
}
.t-dur.active{
  background:linear-gradient(135deg,rgba(91,155,255,0.2),rgba(155,109,255,0.15))!important;
  border-color:rgba(91,155,255,0.4)!important;color:var(--a)!important;
  box-shadow:0 0 16px rgba(91,155,255,0.2)!important;
}

/* Chart container */
#t-chart-wrap{
  border-radius:12px!important;overflow:hidden!important;
  border:1px solid rgba(255,255,255,0.07)!important;
  background:var(--bg)!important;
  box-shadow:inset 0 0 40px rgba(91,155,255,0.03)!important;
}

/* ══════════════════════════════════════════════
   HOME PAGE — Stunning dashboard
══════════════════════════════════════════════ */
.home-hero{
  margin:10px!important;padding:20px!important;
  background:linear-gradient(135deg,rgba(91,155,255,0.12),rgba(155,109,255,0.08),rgba(0,0,0,0.02))!important;
  border:1px solid rgba(91,155,255,0.18)!important;
  border-radius:20px!important;
  box-shadow:0 8px 40px rgba(91,155,255,0.08),inset 0 1px 0 rgba(255,255,255,0.07)!important;
  position:relative;overflow:hidden;
}
.home-hero::before{
  content:'';position:absolute;top:-50%;right:-20%;
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(155,109,255,0.12),transparent 70%);
  pointer-events:none;
}
#hbal-total{
  font-family:var(--fmono)!important;
  font-size:clamp(2rem,9vw,2.8rem)!important;
  font-weight:900!important;letter-spacing:-1.5px!important;
  background:linear-gradient(135deg,#fff 0%,#c8d8ff 50%,#f5c842 100%)!important;
  -webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;
  background-clip:text!important;
  filter:drop-shadow(0 0 20px rgba(91,155,255,0.3));
}

/* Quick action buttons — neon cards */
.qi{
  background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02))!important;
  border:1px solid rgba(255,255,255,0.09)!important;
  border-radius:16px!important;
  transition:all .2s cubic-bezier(.22,.68,0,1.6)!important;
  box-shadow:0 4px 16px rgba(0,0,0,0.4)!important;
}
.qi:active{
  transform:scale(0.86)!important;
  background:rgba(91,155,255,0.12)!important;
  border-color:rgba(91,155,255,0.35)!important;
  box-shadow:0 0 24px rgba(91,155,255,0.25)!important;
}
.qi-ico{
  border-radius:12px!important;
  transition:all .2s!important;
}
.qi-lbl{
  font-family:var(--fhd)!important;font-size:.36rem!important;
  font-weight:700!important;color:var(--t2)!important;letter-spacing:.4px!important;
}

/* ══════════════════════════════════════════════
   MARKET ROWS
══════════════════════════════════════════════ */
.mkt-row{
  border-radius:12px!important;
  transition:all .15s!important;
  padding:12px 14px!important;
}
.mkt-row:active{
  background:rgba(91,155,255,0.07)!important;
  transform:scale(0.98)!important;
}
.mc-price{
  font-family:var(--fmono)!important;font-weight:700!important;
  letter-spacing:-0.5px!important;
}
.mc-chg{
  font-family:var(--fmono)!important;font-size:.56rem!important;
  font-weight:700!important;border-radius:6px!important;padding:2px 7px!important;
}
.mc-chg.chg-up{background:rgba(0,214,143,0.15)!important;color:var(--green)!important}
.mc-chg.chg-dn{background:rgba(255,59,92,0.15)!important;color:var(--red)!important}

/* ══════════════════════════════════════════════
   WALLET BUTTONS
══════════════════════════════════════════════ */
.w-btn{
  background:linear-gradient(135deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02))!important;
  border:1px solid rgba(255,255,255,0.09)!important;border-radius:14px!important;
  transition:all .2s cubic-bezier(.22,.68,0,1.6)!important;
  box-shadow:0 4px 16px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.06)!important;
}
.w-btn:active{
  transform:scale(0.88)!important;
  background:rgba(91,155,255,0.12)!important;
  box-shadow:0 0 20px rgba(91,155,255,0.25)!important;
}

/* ══════════════════════════════════════════════
   TAB BARS
══════════════════════════════════════════════ */
.tab-bar{
  background:rgba(255,255,255,0.03)!important;
  border:1px solid rgba(255,255,255,0.07)!important;
  border-radius:12px!important;padding:3px!important;
}
.tab{
  border-radius:9px!important;
  color:var(--t3)!important;font-family:var(--fhd)!important;
  font-size:.48rem!important;font-weight:700!important;
  transition:all .18s!important;
}
.tab.active{
  background:linear-gradient(135deg,rgba(91,155,255,0.18),rgba(155,109,255,0.12))!important;
  color:var(--a)!important;
  box-shadow:inset 0 0 0 1px rgba(91,155,255,0.25),0 0 12px rgba(91,155,255,0.1)!important;
}

/* ══════════════════════════════════════════════
   STATUS & BADGES
══════════════════════════════════════════════ */
.up,.chg-up{color:var(--green)!important}
.dn,.chg-dn{color:var(--red)!important}
.badge-g,.badge-green{background:rgba(0,214,143,0.12)!important;color:var(--green)!important;border:1px solid rgba(0,214,143,0.2)!important}
.badge-r,.badge-red{background:rgba(255,59,92,0.12)!important;color:var(--red)!important;border:1px solid rgba(255,59,92,0.2)!important}
.mcap-badge{
  background:linear-gradient(135deg,rgba(91,155,255,0.12),rgba(155,109,255,0.08))!important;
  border:1px solid rgba(91,155,255,0.2)!important;color:var(--a)!important;
  font-family:var(--fmono)!important;border-radius:6px!important;
  box-shadow:0 0 8px rgba(91,155,255,0.1)!important;
}
.blockchain-badge{
  background:rgba(155,109,255,0.12)!important;
  border:1px solid rgba(155,109,255,0.2)!important;color:var(--purple)!important;
  font-family:var(--fmono)!important;border-radius:6px!important;
}
.live-dot{
  background:var(--green)!important;
  box-shadow:0 0 8px rgba(0,214,143,0.7),0 0 20px rgba(0,214,143,0.3)!important;
}

/* ══════════════════════════════════════════════
   DAILY STRIP — Cinematic
══════════════════════════════════════════════ */
.ds-card{border-radius:10px!important;transition:all .2s cubic-bezier(.22,.68,0,1.6)!important}
.ds-card.active{
  box-shadow:0 0 20px rgba(91,155,255,0.4),0 0 40px rgba(91,155,255,0.1)!important;
  border-color:rgba(91,155,255,0.5)!important;
}
.ds-card.done{box-shadow:0 0 12px rgba(0,214,143,0.3)!important}

/* ══════════════════════════════════════════════
   GLOBAL WIN / LOSE FLASH
══════════════════════════════════════════════ */
@keyframes winFlash{
  0%{box-shadow:inset 0 0 0 3px rgba(0,214,143,0),0 0 0 rgba(0,214,143,0)}
  30%{box-shadow:inset 0 0 80px rgba(0,214,143,0.3),0 0 80px rgba(0,214,143,0.2)}
  100%{box-shadow:inset 0 0 0 3px rgba(0,214,143,0),0 0 0 rgba(0,214,143,0)}
}
@keyframes loseFlash{
  0%{box-shadow:inset 0 0 0 3px rgba(255,59,92,0),0 0 0 rgba(255,59,92,0)}
  30%{box-shadow:inset 0 0 80px rgba(255,59,92,0.25),0 0 80px rgba(255,59,92,0.15)}
  100%{box-shadow:inset 0 0 0 3px rgba(255,59,92,0),0 0 0 rgba(255,59,92,0)}

function spinWheel(){
  if(!G.uid){toast('Please log in to spin','error');return;}
  if(_spinSpinning){popup('w','Already spinning','');return;}
  var spins=G.spins||0;
  if(spins<=0){popup('w','No spins','Watch an ad for a free spin!');showSpinAdBtn();return;}
  G.spins=spins-1;save({spins:G.spins});
  if($('spin-cnt'))$('spin-cnt').textContent=G.spins;
  _spinSpinning=true;
  // WEIGHTED RANDOM: use chance percentages (not wheel position)
  var totalChance=SPIN_PRIZES.reduce(function(s,p){return s+p.chance;},0);
  var rand=Math.random()*totalChance;
  var cumulative=0;
  var selectedPrize=SPIN_PRIZES[0];
  var selectedIdx=0;
  for(var pi=0;pi<SPIN_PRIZES.length;pi++){
    cumulative+=SPIN_PRIZES[pi].chance;
    if(rand<=cumulative){selectedPrize=SPIN_PRIZES[pi];selectedIdx=pi;break;}
  }
  // Spin the wheel visually to land on the selected prize
  var arc=(2*Math.PI)/SPIN_PRIZES.length;
  var targetAngle=-(selectedIdx*arc + arc/2); // center of prize slice
  // Add several full rotations for visual effect
  var fullSpins=(5+Math.floor(Math.random()*3))*Math.PI*2;
  var finalAngle=targetAngle-fullSpins;
  var startAngle=_spinCurAngle;
  var duration=4000+Math.random()*2000; // ms
  var startTime=null;
  function easeOut(t){return 1-Math.pow(1-t,3);}
  function animate(ts){
    if(!startTime)startTime=ts;
    var elapsed=ts-startTime;
    var progress=Math.min(elapsed/duration,1);
    var eased=easeOut(progress);
    _spinCurAngle=startAngle+(finalAngle-startAngle)*eased;
    drawSpinWheel(_spinCurAngle);
    if(progress<1){
      _spinAnimId=requestAnimationFrame(animate);
    } else {
      _spinSpinning=false;_spinVel=0;
      _spinPrizeLock=true;awardSpinPrize(selectedPrize);
    }
  }
  _spinAnimId=requestAnimationFrame(animate);
  G.spinCount=(G.spinCount||0)+1;
  updateDailyTask('spins',1);
}

/* ═══════════════ SPIN WHEEL DRAW FUNCTION ═══════════════ */
function drawSpinWheel(angle){
  var cv=document.getElementById('spin-cv');
  if(!cv)return;
  var ctx=cv.getContext('2d');
  if(!ctx)return;
  var sz=cv.width;var cx=sz/2,cy=sz/2,r=sz/2-8;
  ctx.clearRect(0,0,sz,sz);
  
  var prizes=window.SPIN_PRIZES||[
    {label:'20% Mine',color:'#f7931a',chance:30},{label:'30% Mine',color:'#9945ff',chance:20},
    {label:'$1.00',color:'#0ecb81',chance:10},{label:'$2.00',color:'#e8b84b',chance:5},
    {label:'1 ZENZ',color:'#00ffcc',chance:30},{label:'5% Disc',color:'#4f8ef7',chance:5}
  ];
  var total=prizes.reduce(function(s,p){return s+(p.chance||1);},0);
  var startA=angle;
  
  prizes.forEach(function(p){
    var sliceA=(p.chance/total)*(Math.PI*2);
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,startA,startA+sliceA);
    ctx.closePath();
    ctx.fillStyle=p.color||'#4f8ef7';
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.15)';
    ctx.lineWidth=1.5;
    ctx.stroke();
    
    // Label
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(startA+sliceA/2);
    ctx.textAlign='right';
    ctx.fillStyle='#fff';
    ctx.font='bold '+(sz<200?9:11)+'px Orbitron,monospace';
    ctx.shadowColor='rgba(0,0,0,.8)';ctx.shadowBlur=4;
    ctx.fillText(p.label,r-8,4);
    ctx.restore();
    
    startA+=sliceA;
  });
  
  // Center circle
  ctx.beginPath();ctx.arc(cx,cy,sz*0.08,0,Math.PI*2);
  var grad=ctx.createRadialGradient(cx,cy,0,cx,cy,sz*0.08);
  grad.addColorStop(0,'#ffffff');grad.addColorStop(1,'#e8b84b');
  ctx.fillStyle=grad;ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=2;ctx.stroke();
  
  // Z logo in center
  ctx.fillStyle='#000';ctx.font='bold '+(sz*0.06)+'px Orbitron,monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Z',cx,cy);
  
  // Outer ring
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(232,184,75,.6)';ctx.lineWidth=3;ctx.stroke();
}

// Draw immediately when defined
if(document.getElementById('spin-cv')){
  drawSpinWheel(0);
}


/* ═══ PROPER SPIN CANVAS INIT ═══ */
function initSpinCanvasProper(){
  var cv=document.getElementById('spin-cv');
  if(!cv)return;
  // Match canvas logical pixels to CSS displayed pixels
  var rect=cv.getBoundingClientRect();
  var displayW=Math.round(rect.width)||Math.min(290,window.innerWidth*0.82);
  var displayH=Math.round(rect.height)||displayW;
  // Set canvas buffer size to match display
  if(cv.width!==displayW||cv.height!==displayH){
    cv.width=displayW;
    cv.height=displayH;
  }
  // Draw the wheel
  try{
    if(typeof drawSpinWheel==='function'){
      drawSpinWheel(0);
    }
  }catch(e){console.warn('Spin draw error:',e);}
}

// Multiple init attempts to catch when layout is ready
window.addEventListener('load',function(){
  setTimeout(initSpinCanvasProper,100);
  setTimeout(initSpinCanvasProper,500);
  setTimeout(initSpinCanvasProper,1500);
});
window.addEventListener('resize',function(){
  clearTimeout(window._spinResizeT);
  window._spinResizeT=setTimeout(initSpinCanvasProper,100);
});

</script>
