*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  /* ── ZenithCrypto v21 — Ultra Pro ── */
  --bg:#04060e;--s1:#080d18;--s2:#0c1220;--s3:#111929;--s4:#18243a;
  /* Primary: premium electric blue */
  --a:#4f8ef7;--a2:#6ba3ff;--a-dim:rgba(79,142,247,0.15);
  /* Gold */
  --gold:#e8b84b;--gold2:#ffd166;--gold-dim:rgba(232,184,75,0.15);
  /* Status */
  --green:#0ecb81;--green-dim:rgba(14,203,129,0.12);
  --red:#f6465d;--red-dim:rgba(246,70,93,0.12);
  /* Accent */
  --purple:#7c5df7;--cyan:#22d3ee;--orange:#f7931a;
  /* Text layers */
  --t1:#eaecf0;--t2:#6c7a96;--t3:#2d3a55;--t4:#1a2235;
  /* Fonts */
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --fhd:'Orbitron',monospace;
  --fmono:'JetBrains Mono',monospace;
  /* Spacing */
  --r:10px;--r-sm:7px;--r-lg:16px;
  --topH:54px;--navH:0px;
  /* Shadows */
  --sh-xs:0 1px 3px rgba(0,0,0,0.5);
  --sh-sm:0 2px 8px rgba(0,0,0,0.5);
  --sh-md:0 4px 20px rgba(0,0,0,0.6);
  --sh-lg:0 8px 40px rgba(0,0,0,0.7);
  --sh-xl:0 20px 60px rgba(0,0,0,0.8);
  /* Glow */
  --glow-a:0 0 20px rgba(79,142,247,0.25),0 0 60px rgba(79,142,247,0.08);
  --glow-g:0 0 20px rgba(14,203,129,0.25),0 0 60px rgba(14,203,129,0.08);
  --glow-r:0 0 20px rgba(246,70,93,0.25);
  --glow-gold:0 0 20px rgba(232,184,75,0.3),0 0 60px rgba(232,184,75,0.08);
  /* Borders */
  --br:rgba(255,255,255,0.07);--br2:rgba(255,255,255,0.04);
  --br-a:rgba(79,142,247,0.3);--br-g:rgba(14,203,129,0.3);
  --br-gold:rgba(232,184,75,0.3);--br-r:rgba(246,70,93,0.3);
  /* Gradients */
  --grad-a:linear-gradient(135deg,#4f8ef7,#7c5df7);
  --grad-g:linear-gradient(135deg,#0ecb81,#06a16a);
  --grad-r:linear-gradient(135deg,#f6465d,#cc2039);
  --grad-gold:linear-gradient(135deg,#e8b84b,#ffd166);
}
/* overridden by v21 CSS */

@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* CHART PAGE */
#pg-tokendetail .td-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* PROFILE PHOTO ACTIONS */
#photo-action-sheet{animation:fadeIn .2s ease}

/* ENHANCED SHADOWS */
.ov-sh{box-shadow:0 -20px 60px rgba(0,0,0,.6)}

/* LOADING */
#ld{position:fixed;inset:0;z-index:9999;background:radial-gradient(ellipse 120% 80% at 50% -20%,rgba(0,229,255,0.07),transparent 55%),radial-gradient(ellipse 60% 60% at 80% 100%,rgba(240,185,11,0.05),transparent 60%),#020509;display:none;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
#ld-cv{position:absolute;inset:0;pointer-events:none}
.ld-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:0}
.ld-logo-wrap{margin-bottom:22px;animation:logoPulse 2.5s ease-in-out infinite}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 12px rgba(0,229,255,0.5)) drop-shadow(0 0 30px rgba(0,255,204,0.25));transform:scale(1)}50%{filter:drop-shadow(0 0 24px rgba(0,255,204,0.7)) drop-shadow(0 0 60px rgba(240,185,11,0.3));transform:scale(1.04)}}
.ld-brand{font-family:var(--fhd);font-size:1.6rem;font-weight:900;color:#fff;letter-spacing:5px;margin-bottom:2px}
.ld-brand-accent{background:linear-gradient(90deg,#00e5ff,#f0b90b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ld-tagline{font-size:.42rem;letter-spacing:5px;color:var(--t3);margin-bottom:32px;text-transform:uppercase}
.ld-track{width:220px;height:3px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;position:relative;margin-bottom:12px}
.ld-track::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,255,204,.6),transparent);animation:shn 1.6s linear infinite}
@keyframes shn{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
#ldf{height:3px;background:linear-gradient(90deg,#00d4ff,#00f0ff,#c471f5,#f0b90b);width:5%;transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 10px rgba(0,229,255,0.6);border-radius:4px}
#ld-msg{font-family:var(--fhd);font-size:.46rem;letter-spacing:3px;color:var(--t3);min-height:18px;text-transform:uppercase}
.ld-foot{position:absolute;bottom:28px;font-family:var(--fhd);font-size:.42rem;letter-spacing:3px;color:rgba(255,255,255,.15)}
.ld-foot b{background:linear-gradient(90deg,#00e5ff,#f0b90b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* AUTH */
#auth-screen{position:fixed;inset:0;z-index:8000;display:block;background:var(--bg);overflow-y:auto}
#auth-cv{position:fixed;inset:0;pointer-events:none;z-index:0}
.auth-wrap{position:relative;z-index:2;min-height:100vh;padding:0 20px 30px;background:radial-gradient(ellipse at 50% -5%,rgba(0,255,204,.06),transparent 55%)}
.auth-hero{display:flex;flex-direction:column;align-items:center;padding:38px 0 22px}
.auth-logo{margin-bottom:14px;animation:hpulse 3s ease-in-out infinite}
.auth-brand{font-family:var(--fhd);font-size:1.2rem;font-weight:900;color:var(--a);letter-spacing:3px}
.auth-brand-sub{font-size:.48rem;letter-spacing:5px;color:var(--t2);margin-top:5px}
.auth-card{background:rgba(13,17,23,.9);border:1px solid rgba(0,255,204,.12);border-radius:16px;padding:20px;backdrop-filter:blur(12px)}
.a-tabs{display:flex;background:var(--s2);border-radius:9px;padding:3px;margin-bottom:20px;border:1px solid var(--s3)}
.a-tab{flex:1;text-align:center;padding:9px;font-family:var(--fhd);font-size:.58rem;font-weight:700;cursor:pointer;border-radius:7px;color:var(--t2);transition:.2s;letter-spacing:1px}
.a-tab.on{background:rgba(0,255,204,.12);color:var(--a);border:1px solid rgba(0,255,204,.3)}
.a-pane{display:none}.a-pane.on{display:block}
.a-field{margin-bottom:12px}
.a-lbl{display:block;font-family:var(--fhd);font-size:.48rem;color:var(--t2);margin-bottom:5px;letter-spacing:1.5px}
.a-inp{width:100%;background:var(--s2);border:1.5px solid var(--s3);border-radius:var(--r);padding:12px 14px;color:var(--t1);font-family:var(--font);font-size:.82rem;outline:none;transition:.2s}
.a-inp:focus{border-color:var(--a);box-shadow:0 0 0 3px rgba(0,255,204,.06)}
.a-err{font-family:var(--fhd);font-size:.54rem;color:var(--red);min-height:16px;text-align:center;margin:4px 0 6px}
.btn-auth{width:100%;background:var(--a);color:#000;border:none;border-radius:var(--r);padding:13px;font-family:var(--fhd);font-size:.68rem;font-weight:900;cursor:pointer;letter-spacing:1.5px;margin-bottom:10px;box-shadow:0 4px 20px rgba(0,255,204,.22);transition:.15s}
.btn-auth:active{opacity:.85;transform:scale(.98)}
.btn-auth-ghost{width:100%;background:var(--s2);color:var(--t1);border:1.5px solid var(--s3);border-radius:var(--r);padding:11px;font-family:var(--font);font-size:.75rem;cursor:pointer;transition:.15s}
.btn-auth-guest{width:100%;background:rgba(255,255,255,.03);color:var(--t3);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);padding:10px;font-family:var(--font);font-size:.72rem;cursor:pointer;transition:.15s;margin-top:8px}
.btn-auth-ghost:active{background:var(--s3)}
.a-divider{text-align:center;color:var(--t3);font-size:.58rem;margin:8px 0;position:relative}
.a-divider::before,.a-divider::after{content:'';position:absolute;top:50%;width:44%;height:1px;background:var(--s3)}
.a-divider::before{left:0}.a-divider::after{right:0}
.a-switch{text-align:center;margin-top:10px;font-size:.62rem;color:var(--t2)}
.a-switch b{color:var(--a);cursor:pointer}

/* APP */
#app{display:none;flex-direction:column;height:100%}

/* TOPBAR */
#topbar{height:var(--topH);background:rgba(7,9,15,.95);border-bottom:1px solid rgba(0,212,255,.12);display:flex;align-items:center;padding:0 12px;gap:7px;flex-shrink:0;z-index:50;backdrop-filter:blur(20px);box-shadow:0 1px 0 rgba(0,212,255,.07),0 4px 20px rgba(0,0,0,.3)}
.tb-logo{display:flex;align-items:center;gap:7px;cursor:pointer;flex-shrink:0}
.tb-brand{font-family:var(--fhd);font-size:.66rem;font-weight:700;color:var(--a);letter-spacing:1px}
.tb-sp{flex:1}
.tb-xp-wrap{width:44px;height:2px;background:var(--s3);border-radius:2px;overflow:hidden}
#xpf{height:2px;background:linear-gradient(90deg,var(--a),var(--gold));width:0%;transition:width .5s}
#hbal{font-family:var(--fhd);font-size:.82rem;font-weight:700;margin-left:6px}
#hlv{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;font-family:var(--fhd);font-size:.44rem;font-weight:900;padding:2px 7px;border-radius:20px;margin-left:4px;letter-spacing:.5px;white-space:nowrap}
.tb-btn{width:32px;height:32px;background:none;border:none;color:var(--t2);font-size:.9rem;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.1s;position:relative;flex-shrink:0}
.tb-btn:active{background:var(--s2)}
#notif-badge{position:absolute;top:2px;right:2px;width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--s1);display:none}

/* TICKER */
#ticker-wrap{height:26px;background:rgba(240,185,11,.03);border-bottom:1px solid rgba(255,255,255,.05);overflow:hidden;display:flex;align-items:center;flex-shrink:0}
#ticker{display:flex;gap:18px;animation:tkscroll 36s linear infinite;white-space:nowrap;padding-left:12px}
@keyframes tkscroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ti{display:inline-flex;gap:4px;align-items:center;font-size:.52rem}
.ti-s{font-family:var(--fhd);color:var(--t2);font-weight:700}
.up{color:var(--green)}.dn{color:var(--red)}

/* PAGES */
#pages{flex:1;overflow:hidden;position:relative;min-height:0}
.page{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;display:none;background:var(--bg);-webkit-overflow-scrolling:touch;overscroll-behavior:contain;box-sizing:border-box;padding-bottom:calc(var(--navH) + 24px)!important}
.page.active{display:block}
.page{padding-bottom:calc(var(--navH) + 20px)!important}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}

/* NAV */
#nav{height:var(--navH);background:rgba(7,9,15,.96);border-top:1px solid rgba(0,212,255,.1);display:flex;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;box-shadow:0 -4px 30px rgba(0,0,0,.5);backdrop-filter:blur(20px);}
#nav::-webkit-scrollbar{display:none}
.ni{flex:0 0 calc(100%/8);min-width:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;background:none;border:none;color:var(--t3);font-family:var(--fhd);font-size:.36rem;font-weight:700;letter-spacing:.3px;transition:.2s;position:relative;padding:5px 0}
.ni.active{color:var(--a)}.ni.active svg{filter:drop-shadow(0 0 5px rgba(240,185,11,.5))}.ni-ico{font-size:1.15rem}
.ni.active .ni-ico{filter:drop-shadow(0 0 6px var(--a))}
.ni-locked::after{content:'';position:absolute;top:4px;right:4px;font-size:.55rem}

/* ═══ BINANCE EXCHANGE UI OVERHAUL ═══ */
/* Market row - Binance style */
.mkt-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:.15s;-webkit-tap-highlight-color:transparent}
.mkt-row:active{background:var(--s2)}
.mc-ico{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;font-weight:700}
.mc-info{flex:1;min-width:0}
.mc-sym{font-family:var(--fhd);font-size:.7rem;font-weight:700;color:var(--t1)}
.mc-name{font-size:.58rem;color:var(--t2);margin-top:1px}
.mc-chain{font-size:.46rem;color:var(--t3);margin-top:1px}
.mc-right{text-align:right;flex-shrink:0}
.mc-price{font-family:var(--fhd);font-size:.74rem;font-weight:700;color:var(--t1)}
.mc-chg{font-family:var(--fhd);font-size:.52rem;padding:2px 8px;border-radius:4px;margin-top:3px;display:inline-block}
.chg-up{background:rgba(14,203,129,.15);color:var(--green)}
.chg-dn{background:rgba(246,70,93,.15);color:var(--red)}

/* Binance-style order/trade button */
.btn-up{background:#0ecb81;color:#000;border:none;border-radius:6px;padding:12px;font-family:var(--fhd);font-size:.58rem;font-weight:900;cursor:pointer;width:100%;letter-spacing:1px;transition:.15s}
.btn-dn{background:#f6465d;color:#fff;border:none;border-radius:6px;padding:12px;font-family:var(--fhd);font-size:.58rem;font-weight:900;cursor:pointer;width:100%;letter-spacing:1px;transition:.15s}

/* Binance stat boxes */
.stat-box{background:var(--s2);border-radius:8px;padding:10px;text-align:center}
.stat-v{font-family:var(--fhd);font-size:.82rem;font-weight:700;color:var(--t1)}
.stat-l{font-size:.44rem;color:var(--t3);margin-top:3px;letter-spacing:1px}

/* Miner card - Binance dark */
.miner-card{background:var(--s1);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:14px;margin-bottom:8px;position:relative;overflow:hidden}
.miner-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.miner-logo{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.miner-info{flex:1;min-width:0}
.miner-name{font-family:var(--fhd);font-size:.66rem;font-weight:700;color:var(--t1)}
.miner-tier{font-size:.46rem;letter-spacing:2px;margin:2px 0}
.miner-rate{font-size:.6rem;color:var(--t2)}
.miner-sec{font-size:.52rem;color:var(--t3)}
.udot{width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15)}
.udot.on{border-color:currentColor}

/* Auction card */
.auc-card{background:var(--s1);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:14px;margin-bottom:8px}
.auc-time{font-family:var(--fhd);font-size:.48rem;color:var(--t2);margin:7px 0 5px}
.auc-bids{font-size:.6rem;color:var(--t2)}

/* Binance-style profit/loss colors */
.pnl-up{color:var(--green);font-family:var(--fhd);font-weight:700}
.pnl-dn{color:var(--red);font-family:var(--fhd);font-weight:700}

/* Home hero - Binance style */
.home-hero{padding:16px 14px;background:var(--s1);border-bottom:1px solid rgba(255,255,255,.06)}
.hh-bal{font-family:var(--fhd);font-size:2rem;font-weight:900;color:var(--t1);margin-bottom:4px}
.hh-cur{font-size:.8rem;color:var(--t2);font-family:var(--font);font-weight:400}

/* Quick icon grid */
.qi{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;flex:0 0 auto;padding:0 8px;min-width:64px}
.qi-ico{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;transition:.15s;background:var(--s2)}
.qi-ico:active{transform:scale(.93)}
.qi-lbl{font-family:var(--fhd);font-size:.38rem;color:var(--t2);letter-spacing:.8px;text-align:center}

/* Spin prizes table */
.prize-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--s1);border:1px solid rgba(255,255,255,.06);border-radius:8px;margin-bottom:6px}
.prize-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.prize-lbl{font-size:.62rem;color:var(--t1);flex:1}
.prize-chance{font-family:var(--fhd);font-size:.52rem;padding:2px 9px;border-radius:20px;background:rgba(255,255,255,.06)}

/* Profile stat grid */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}


/* COMPONENTS */
.card{background:var(--s1);border:1px solid var(--s2);border-radius:14px;padding:14px;margin-bottom:10px}
.card-a{border-color:rgba(0,255,204,.15)}.card-gold{border-color:rgba(240,185,11,.15)}.card-pur{border-color:rgba(153,69,255,.15)}
.tab-bar{display:flex;overflow-x:auto;background:var(--s1);border-bottom:1px solid var(--s2);flex-shrink:0}
.tab-bar::-webkit-scrollbar{display:none}

.btn-c{background:linear-gradient(135deg,var(--a),var(--a2));color:#000;box-shadow:0 0 12px rgba(0,255,204,.18)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000}
.btn-g{background:linear-gradient(135deg,#00e676,#00c853);color:#000}.btn-r{background:linear-gradient(135deg,#ff4757,#d63031);color:#fff}
.btn-ghost{background:var(--s2);color:var(--t1);border:1px solid var(--s3)}
.btn-pur{background:rgba(153,69,255,.15);color:var(--purple);border:1px solid rgba(153,69,255,.3)}
.btn-blk{width:100%}.btn-sm{padding:6px 11px;font-size:.54rem;border-radius:7px}.btn-xs{padding:4px 8px;font-size:.5rem;border-radius:6px}
.inp{width:100%;background:var(--s2);border:1.5px solid var(--s3);border-radius:var(--r);padding:11px 13px;color:var(--t1);font-family:var(--font);font-size:.8rem;outline:none;transition:.2s}

.f-row{background:var(--s2);border-radius:9px;padding:10px 12px;display:flex;align-items:center;gap:8px;border:1.5px solid var(--s3);transition:.2s}
.f-row:focus-within{border-color:var(--a)}.f-inp{background:none;border:none;color:var(--t1);font-family:var(--fhd);font-size:.88rem;flex:1;outline:none;width:100%}
.f-unit{font-family:var(--fhd);font-size:.56rem;color:var(--t2);font-weight:700}
.badge{padding:2px 8px;border-radius:20px;font-size:.5rem;font-weight:700;display:inline-block;font-family:var(--fhd);letter-spacing:.3px}
.badge-g{background:rgba(14,203,129,.1);color:var(--green);border:1px solid rgba(14,203,129,.2)}
.badge-r{background:rgba(246,70,93,.1);color:var(--red);border:1px solid rgba(246,70,93,.2)}
.badge-gold{background:rgba(240,185,11,.1);color:var(--gold);border:1px solid rgba(240,185,11,.2)}
.badge-a{background:rgba(0,255,204,.1);color:var(--a);border:1px solid rgba(0,255,204,.2)}
.badge-pur{background:rgba(153,69,255,.1);color:var(--purple);border:1px solid rgba(153,69,255,.2)}
.empty{text-align:center;padding:36px 20px;color:var(--t3);font-family:var(--fhd);font-size:.58rem;line-height:2.2}
.sec-hd{display:flex;justify-content:space-between;align-items:center;padding:11px 14px 7px}
.sec-title{font-family:var(--fhd);font-size:.54rem;font-weight:700;color:var(--t2);letter-spacing:2px}

.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:.7rem}
.info-lbl{color:var(--t2);font-size:.6rem}.info-val{font-family:var(--fhd);font-size:.65rem}
.divider{height:6px;background:var(--bg)}

/* TOAST */
#toast-wrap{position:fixed;top:calc(var(--topH)+6px);left:50%;transform:translateX(-50%);z-index:9000;display:flex;flex-direction:column;gap:5px;width:100%;max-width:360px;align-items:center;pointer-events:none}
.toast-item{background:var(--s1);border-radius:10px;padding:9px 13px;display:flex;gap:8px;align-items:flex-start;max-width:92vw;box-shadow:0 6px 28px rgba(0,0,0,.65);animation:tin .2s ease;pointer-events:all;border-left:3px solid var(--a)}
@keyframes tin{from{transform:translateY(-10px);opacity:0}to{opacity:1}}
.t-title{font-family:var(--fhd);font-size:.6rem;font-weight:700;display:block}
.t-msg{font-size:.56rem;color:var(--t2);display:block;margin-top:2px}
#toast{display:none;position:fixed;top:calc(var(--topH)+8px);left:50%;transform:translateX(-50%);z-index:99999;background:var(--s1);border-radius:10px;padding:10px 15px;display:flex;gap:8px;align-items:center;box-shadow:0 6px 28px rgba(0,0,0,.65);border-left:3px solid var(--a);max-width:92vw}
#toast-icon{font-size:.85rem}
.toast-body{flex:1}
#toast-title{font-family:var(--fhd);font-size:.6rem;font-weight:700;display:block}
#toast-msg{font-size:.56rem;color:var(--t2);display:block;margin-top:2px}

/* OVERLAYS */
.ov{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:.2s}
.ov.show{opacity:1;pointer-events:all}
.ov-sh{background:var(--s1);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:.3s cubic-bezier(.32,.72,0,1);border-top:1px solid rgba(0,255,204,.1)}
.ov.show .ov-sh{transform:translateY(0)}
.ov-hdl{width:36px;height:3px;background:var(--s3);border-radius:2px;margin:12px auto 4px}
.ov-title{font-family:var(--fhd);font-size:.7rem;font-weight:700;color:var(--a);padding:8px 18px 12px;letter-spacing:1px}
.ov-pad{padding:0 18px 24px}
#ov-ban,#ov-maint{position:fixed;inset:0;z-index:9100;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px;text-align:center}
#ov-ban.show,#ov-maint.show{display:flex}

/* AD OVERLAYS */
#ad-video,#ad-inter{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.96);display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;padding:20px;text-align:center}
.ad-box{width:320px;max-width:90vw;background:var(--s2);border-radius:12px;overflow:hidden;border:1px solid var(--s3);min-height:200px;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:16px;gap:8px}

.ad-skip{display:none!important}
.ad-queue-lbl{font-family:var(--fhd);font-size:.66rem;color:var(--gold)}
.ad-rew-lbl{font-family:var(--fhd);font-size:.56rem;color:var(--a)}

/* HOME PAGE */
.home-hero{background:linear-gradient(160deg,var(--s1),rgba(0,255,204,.015));padding:14px;border-bottom:1px solid var(--s2);position:relative;overflow:hidden}

.hh-xp-row{display:flex;justify-content:space-between;font-family:var(--fhd);font-size:.44rem;color:var(--t3);margin-top:9px;margin-bottom:3px}
.hh-xpbar{height:3px;background:var(--s3);border-radius:2px;overflow:hidden}
#h-xpbar{height:3px;background:linear-gradient(90deg,var(--a),var(--gold));width:0%;border-radius:2px;transition:width .5s;box-shadow:0 0 5px var(--a)}
.hero-btns{display:flex;gap:4px;margin-top:11px}
.hb{flex:1;border:none;border-radius:8px;padding:8px 2px;font-family:var(--fhd);font-size:.42rem;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.15s}

.hb-a{background:rgba(0,255,204,.08);color:var(--a);border:1px solid rgba(0,255,204,.2)}

/* MARKET */

/* TRADE */
.trade-hero{background:var(--s1);padding:12px 14px;border-bottom:1px solid var(--s2)}

.t-stats{display:flex;gap:12px;margin-top:5px;flex-wrap:wrap}
.t-stat{display:flex;flex-direction:column}.t-stat label{font-family:var(--fhd);font-size:.44rem;color:var(--t2)}
.t-stat span{font-family:var(--fhd);font-size:.6rem;font-weight:700}
.chart-box{background:var(--s1);height:155px;margin:8px 10px;border-radius:12px;overflow:hidden;border:1px solid var(--s2);position:relative}

.t-info-bar{display:flex;justify-content:space-between;font-size:.52rem;color:var(--t2);margin-top:9px;padding-top:7px;border-top:1px solid var(--s2)}

/* MINE */
.mine-hero{background:linear-gradient(160deg,rgba(14,203,129,.05),var(--bg));padding:14px;border-bottom:1px solid var(--s2);position:relative;overflow:hidden}
.mine-hero::after{content:'';position:absolute;right:8px;top:6px;font-size:4rem;opacity:.04;pointer-events:none}
.mine-rate-lbl{font-family:var(--fhd);font-size:.46rem;color:var(--t2);letter-spacing:2px;margin-bottom:4px}

.msb-v{font-family:var(--fhd);font-size:.8rem;font-weight:700}.msb-l{font-family:var(--fhd);font-size:.42rem;color:var(--t2);margin-top:2px}

.miner-card{border-radius:14px;padding:13px;margin-bottom:9px;border:1.5px solid;position:relative;overflow:hidden;transition:.15s}

.miner-card::before{content:'';position:absolute;top:-10px;right:-10px;width:70px;height:70px;border-radius:50%;opacity:.12;pointer-events:none}

.miner-logo{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;position:relative}

.ac-info{flex:1}.ac-sym{font-family:var(--fhd);font-size:.68rem;font-weight:700}.ac-name{font-size:.54rem;color:var(--t2)}
.ac-right{text-align:right}.ac-amt{font-family:var(--fhd);font-size:.68rem;font-weight:600}.ac-usd{font-size:.54rem;color:var(--t2)}
.swap-box{background:var(--s2);border-radius:12px;padding:13px;margin-bottom:4px;border:1px solid var(--s3)}

.swap-rate-row{font-family:var(--fhd);font-size:.5rem;color:var(--t2);text-align:center;padding:6px;background:rgba(0,255,204,.03);border-radius:6px;border:1px solid rgba(0,255,204,.08);margin:6px 0}

/* PROFILE */
.av-big{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--gold));display:flex;align-items:center;justify-content:center;font-family:var(--fhd);font-size:1.4rem;font-weight:900;color:#000;box-shadow:0 0 16px rgba(0,255,204,.2);cursor:pointer;flex-shrink:0}
.prof-hero{background:linear-gradient(160deg,var(--s1),var(--bg));padding:14px;border-bottom:1px solid var(--s2)}
.prof-top{display:flex;align-items:center;gap:12px;margin-bottom:13px}
.prof-details{flex:1;min-width:0}
.prof-name{font-size:.9rem;font-weight:700}.prof-uname{font-family:var(--fhd);font-size:.54rem;color:var(--t2);margin-top:2px}
.prof-pid{font-family:var(--fhd);font-size:.48rem;color:var(--t3);margin-top:2px}
.prof-edit-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.025)}
.per-lbl{font-family:var(--fhd);font-size:.48rem;color:var(--t2);letter-spacing:.5px;flex-shrink:0;width:80px}
.per-val{font-size:.75rem;font-weight:600;flex:1;margin:0 8px;color:var(--t1)}
.per-act{font-family:var(--fhd);font-size:.46rem;color:var(--a);cursor:pointer;flex-shrink:0}
.per-uses{font-family:var(--fhd);font-size:.44rem;color:var(--t3);flex-shrink:0;margin-left:4px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.stat-box{background:rgba(255,255,255,.025);border-radius:8px;padding:8px;text-align:center;border:1px solid var(--s2)}
.stat-v{font-family:var(--fhd);font-size:.78rem;font-weight:700}.stat-l{font-family:var(--fhd);font-size:.4rem;color:var(--t2);margin-top:2px}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.025)}
.lb-rank{font-family:var(--fhd);font-size:.78rem;font-weight:700;width:28px;text-align:center;flex-shrink:0}
.lb-rank.r1{color:#ffd700}.lb-rank.r2{color:#c0c0c0}.lb-rank.r3{color:#cd7f32}
.lb-av{width:30px;height:30px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-family:var(--fhd);font-size:.75rem;font-weight:900;margin:0 8px;flex-shrink:0}
.lb-info{flex:1}.lb-name{font-size:.74rem;font-weight:600}.lb-sub{font-family:var(--fhd);font-size:.5rem;color:var(--t2);margin-top:1px}
.lb-val{font-family:var(--fhd);font-size:.68rem;font-weight:700;color:var(--a);flex-shrink:0}

/* TASKS */
.task-card{background:var(--s1);border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid var(--s2);display:flex;gap:10px;align-items:flex-start}
.task-ico{width:38px;height:38px;border-radius:10px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.task-info{flex:1;min-width:0}.task-title{font-size:.76rem;font-weight:700;margin-bottom:2px}
.task-desc{font-size:.58rem;color:var(--t2);margin-bottom:5px;line-height:1.6}
.task-bot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
.task-rew{font-family:var(--fhd);font-size:.56rem;color:var(--green)}.task-slots{font-family:var(--fhd);font-size:.46rem;color:var(--t2)}
.sys-task{background:var(--s1);border-radius:11px;padding:11px;margin-bottom:7px;border:1px solid var(--s2)}
.sys-task-hd{display:flex;justify-content:space-between;margin-bottom:5px}
.sys-task-name{font-size:.74rem;font-weight:700}.sys-task-rew{font-family:var(--fhd);font-size:.56rem;color:var(--gold)}
.sys-task-track{height:3px;background:var(--s3);border-radius:2px;overflow:hidden}
.sys-task-fill{height:3px;background:linear-gradient(90deg,var(--a),var(--gold));border-radius:2px;transition:width .3s}
.sys-task-bot{display:flex;justify-content:space-between;margin-top:4px;font-family:var(--fhd);font-size:.44rem;color:var(--t2)}
.task-timer-bar{background:var(--s2);border-radius:6px;padding:6px 9px;font-family:var(--fhd);font-size:.54rem;color:var(--a);text-align:center;margin-top:8px}

/* SOCIAL */
.chat-msg{display:flex;gap:7px;align-items:flex-start;padding:4px 0}
.chat-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fhd);font-size:.6rem;font-weight:900;color:#000;flex-shrink:0}
.chat-bub{background:var(--s2);border-radius:10px;padding:6px 10px;max-width:78vw}
.chat-sender{font-family:var(--fhd);font-size:.48rem;color:var(--a);margin-bottom:2px}
.chat-text{font-size:.7rem;color:var(--t1);word-break:break-word;line-height:1.5}
.chat-time{font-family:var(--fhd);font-size:.42rem;color:var(--t3);margin-top:2px}
.my-msg .chat-bub{background:rgba(0,255,204,.08);border:1px solid rgba(0,255,204,.15)}

/* BOOST/VIP */
.boost-hero{background:linear-gradient(135deg,rgba(153,69,255,.08),var(--bg));padding:14px;border-bottom:1px solid var(--s2);text-align:center}
.vip-card{border-radius:14px;padding:13px;margin-bottom:9px;border:1px solid;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.vip-card:active{transform:scale(.98)}
.vip-name{font-family:var(--fhd);font-size:.76rem;font-weight:700;letter-spacing:.5px;margin-bottom:4px}
.vip-perks{font-size:.6rem;color:var(--t2);line-height:1.9;margin-bottom:9px}.vip-price{font-family:var(--fhd);font-size:.9rem;font-weight:900}
.zenz-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px}
.zenz-pack{background:var(--s1);border-radius:12px;padding:12px;text-align:center;border:1px solid rgba(240,185,11,.15);cursor:pointer;transition:.15s}
.zenz-pack:active{transform:scale(.97)}.zenz-ico{font-size:1.5rem;margin-bottom:3px}
.zenz-amt{font-family:var(--fhd);font-size:.88rem;font-weight:700;color:var(--gold)}
.zenz-price{font-family:var(--fhd);font-size:.56rem;color:var(--t2);margin-top:2px}

/* SPIN */
.spin-page{padding:14px;display:flex;flex-direction:column;align-items:center}
#spin-cv{border-radius:50%;filter:drop-shadow(0 0 18px rgba(0,255,204,.3));display:block}
.prize-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.prize-color{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-right:7px}
.prize-lbl{font-size:.7rem;flex:1}.prize-chance{font-family:var(--fhd);font-size:.48rem;color:var(--t2)}

/* TOKENS */
.token-card{background:var(--s1);border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid var(--s2);display:flex;align-items:center;gap:10px;cursor:pointer;transition:.1s}
.token-card:active{background:var(--s2)}.tk-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:900;flex-shrink:0}
.tk-sym{font-family:var(--fhd);font-size:.68rem;font-weight:700}.tk-name{font-size:.56rem;color:var(--t2);margin-top:1px}
.tk-price{font-family:var(--fhd);font-size:.68rem;font-weight:600}.tk-chg{font-family:var(--fhd);font-size:.52rem;margin-top:2px}

/* AUCTIONS */
.auc-card{background:var(--s1);border-radius:12px;padding:13px;margin-bottom:9px;border:1px solid var(--s2)}
.auc-time{font-family:var(--fhd);font-size:.56rem;color:var(--red);margin-top:4px}
.auc-bids{font-family:var(--fhd);font-size:.54rem;color:var(--t2);margin-top:3px}

/* NFT */
.nft-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:10px}
.nft-card{background:var(--s1);border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.06);cursor:pointer;transition:all .2s;display:flex;flex-direction:column}
.nft-card:active{transform:scale(.96)}.nft-card:hover{border-color:rgba(0,212,255,.2);transform:translateY(-2px)}
.nft-art{height:120px;display:flex;align-items:center;justify-content:center;font-size:2.6rem;position:relative}
.nft-info{padding:10px;flex:1}.nft-name{font-family:Orbitron,monospace;font-size:.52rem;font-weight:700;color:var(--t1);margin-bottom:2px}
.nft-price{font-family:Orbitron,monospace;font-size:.6rem;color:var(--gold);font-weight:900}
.nft-rarity-common{color:#888}.nft-rarity-uncommon{color:#00e676}.nft-rarity-rare{color:#00d4ff}
.nft-rarity-epic{color:#c471f5}.nft-rarity-legendary{color:#f0b90b}.nft-rarity-mythic{color:#ff4757}
.nft-info{padding:8px}.nft-name{font-family:var(--fhd);font-size:.64rem;font-weight:700}
.nft-price{font-family:var(--fhd);font-size:.58rem;color:var(--gold);margin-top:3px}

/* RUNES */
.rune-card{background:var(--s1);border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid rgba(153,69,255,.15);display:flex;align-items:center;gap:10px}
.rune-ico{width:40px;height:40px;border-radius:50%;background:rgba(153,69,255,.1);display:flex;align-items:center;justify-content:center;font-size:1.2rem;border:1px solid rgba(153,69,255,.25)}

/* REFERRAL */
.ref-code-box{background:rgba(0,255,204,.04);border:1px solid rgba(0,255,204,.2);border-radius:12px;padding:18px;text-align:center;margin-bottom:14px}
.ref-code{font-family:var(--fhd);font-size:1.2rem;font-weight:900;color:var(--a);letter-spacing:3px}

/* MUSIC BAR */
#music-bar{position:fixed;bottom:calc(var(--navH)+6px);right:12px;z-index:600;display:none;align-items:center;gap:5px;background:var(--s1);border:1px solid rgba(0,255,204,.15);border-radius:20px;padding:5px 11px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.music-ico{font-size:.88rem}.music-lbl{font-family:var(--fhd);font-size:.44rem;color:var(--a)}
@keyframes musicPulse{0%,100%{opacity:.6}50%{opacity:1}}
#music-bar.playing{animation:musicPulse 2s ease-in-out infinite}

/* ANIMATIONS */
@keyframes fadeUp{from{transform:translateY(8px);opacity:0}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .3s ease}
@keyframes spin360{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* ═══════════ ZENITH v3 PREMIUM DESIGN ═══════════ */
body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 70% 40% at 50% -10%,rgba(0,229,255,0.05),transparent),
    radial-gradient(ellipse 50% 30% at 85% 85%,rgba(240,185,11,0.03),transparent);
}
#topbar{
  background:rgba(11,15,26,0.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(0,229,255,0.1);
  box-shadow:0 1px 20px rgba(0,0,0,0.5)}
.tb-brand{
  font-size:.74rem;font-weight:900;letter-spacing:3px;
  background:linear-gradient(90deg,#00e5ff,#f0b90b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text}
#nav{
  background:rgba(9,13,24,0.98);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid rgba(0,229,255,0.08);
  box-shadow:0 -2px 30px rgba(0,0,0,0.6)}
#nav .ni{color:var(--t3);transition:.2s;gap:3px;font-size:.44rem;letter-spacing:.5px;border-top:2px solid transparent}
#nav .ni svg{stroke:currentColor;transition:.2s}
#nav .ni.active{color:var(--a);border-top-color:var(--a)}
#nav .ni.active svg{filter:drop-shadow(0 0 5px rgba(0,229,255,0.5))}
/* Ticker */
#ticker-wrap{background:linear-gradient(90deg,rgba(0,229,255,0.03),rgba(0,0,0,0));border-bottom:1px solid rgba(0,229,255,0.06)}
/* Chart */
.chart-box{
  background:linear-gradient(180deg,rgba(19,24,37,0.9),rgba(11,15,26,1));
  height:180px;border:1px solid rgba(0,229,255,0.1);
  border-radius:14px;overflow:hidden;position:relative;margin:8px 10px 6px}
.chart-label{
  position:absolute;top:9px;left:12px;z-index:2;
  font-family:var(--fhd);font-size:.44rem;
  color:rgba(0,229,255,0.4);letter-spacing:2px;pointer-events:none}
/* Price display */
.t-price-big{font-family:var(--fhd);font-size:2rem;font-weight:900;letter-spacing:-1px;line-height:1;margin-top:4px}
.t-price-big.up{color:#00c896;text-shadow:0 0 24px rgba(0,200,150,0.5)}
.t-price-big.dn{color:#ff3d5a;text-shadow:0 0 24px rgba(255,61,90,0.5)}
/* Trade card */
.o-card{background:var(--s1);border:1px solid rgba(0,229,255,0.07);border-radius:14px;padding:14px;margin:0 10px 10px}
/* Direction tabs */
.dir-tabs{display:flex;gap:8px;margin-bottom:14px}
.dir-tab{
  flex:1;padding:13px;text-align:center;font-family:var(--fhd);font-size:.6rem;
  font-weight:700;letter-spacing:1px;cursor:pointer;
  border-radius:10px;transition:.2s;border:1.5px solid var(--s3);color:var(--t2)}
.dir-tab.buy{color:var(--t2);border-color:var(--s3)}
.dir-tab.buy.on{
  background:linear-gradient(135deg,rgba(0,200,150,0.18),rgba(0,200,150,0.06));
  border-color:var(--green);color:var(--green)}
.dir-tab.sell{color:var(--t2);border-color:var(--s3)}
.dir-tab.sell.on{
  background:linear-gradient(135deg,rgba(255,61,90,0.18),rgba(255,61,90,0.06));
  border-color:var(--red);color:var(--red)}
/* Amount input */
.f-row{position:relative;margin-bottom:10px}
.f-inp{
  width:100%;background:var(--s2)!important;
  border:1.5px solid rgba(0,229,255,0.1)!important;border-radius:10px!important;
  font-family:var(--fhd)!important;font-size:.92rem!important;
  color:var(--t1)!important;padding:12px 44px 12px 14px!important;
  box-sizing:border-box;outline:none!important;transition:.2s}
.f-inp:focus{border-color:rgba(0,229,255,0.35)!important;box-shadow:0 0 0 3px rgba(0,229,255,0.07)!important}
.f-unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-family:var(--fhd);font-size:.52rem;color:var(--t3)}
/* Pct buttons */
.pct-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.pct-btn{
  background:var(--s2);border:1px solid var(--s3);color:var(--t2);
  border-radius:8px;padding:8px 4px;font-size:.6rem;cursor:pointer;
  font-family:var(--fhd);transition:.15s;letter-spacing:.5px}
.pct-btn:hover{background:rgba(0,229,255,0.1);color:var(--a);border-color:var(--a)}
/* Duration */
.dur-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.dur-btn{
  background:var(--s2);border:1px solid var(--s3);color:var(--t2);
  border-radius:9px;padding:9px 4px;font-family:var(--fhd);font-size:.54rem;
  cursor:pointer;transition:.15s;text-align:center;letter-spacing:.5px}
.dur-btn.on{background:rgba(0,229,255,0.12);border-color:var(--a);color:var(--a)}
/* Info bar */
.t-info-bar{
  display:flex;justify-content:space-between;
  padding:9px 12px;background:rgba(19,24,37,0.8);
  border-radius:10px;margin-bottom:12px;font-size:.6rem;color:var(--t2)}
.t-info-bar b{color:var(--t1)}
/* Place trade */
#t-place-btn{
  background:linear-gradient(135deg,#00c896,#009e78)!important;
  box-shadow:0 4px 20px rgba(0,200,150,0.3);
  border:none!important;letter-spacing:2px;font-size:.68rem!important}
#t-place-btn:active{transform:scale(0.98)}
/* Leaderboard */
.lb-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.03);transition:.1s}
.lb-row:hover{background:rgba(0,229,255,0.025)}
.lb-rank{font-family:var(--fhd);font-size:.72rem;font-weight:900;width:26px;text-align:center;flex-shrink:0;color:var(--t3)}
.lb-rank.r1{color:#f0b90b;text-shadow:0 0 12px rgba(240,185,11,0.6)}
.lb-rank.r2{color:#c0c0c0}
.lb-rank.r3{color:#cd7f32}
.lb-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.76rem;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.08)}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:.7rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-sub{font-size:.52rem;color:var(--t2);margin-top:2px;font-family:var(--fhd)}
.lb-val{font-family:var(--fhd);font-size:.64rem;font-weight:700;color:var(--a);white-space:nowrap;text-align:right}
/* Chat */
.chat-msg{display:flex;gap:8px;padding:5px 0;align-items:flex-start}
.chat-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.7rem;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.08)}
.chat-bub{background:rgba(26,32,48,0.8);border-radius:4px 12px 12px 12px;padding:8px 11px;max-width:82%;border:1px solid rgba(255,255,255,0.04)}
.my-msg{flex-direction:row-reverse}
.my-msg .chat-bub{background:rgba(0,229,255,0.1);border-radius:12px 4px 12px 12px;border-color:rgba(0,229,255,0.15)}
.chat-sender{font-family:var(--fhd);font-size:.44rem;font-weight:700;margin-bottom:3px}
.chat-text{font-size:.72rem;line-height:1.5;color:var(--t1);word-break:break-word}
.chat-time{font-size:.44rem;color:var(--t3);margin-top:4px;text-align:right}
/* Cards */
.card,.o-card{border-radius:14px}
/* Buttons */
.btn{border-radius:10px;font-family:var(--fhd);letter-spacing:.5px}
.btn-c{background:linear-gradient(135deg,rgba(0,229,255,0.2),rgba(0,229,255,0.08));border:1px solid rgba(0,229,255,0.3);color:var(--a)}
.btn-g{background:linear-gradient(135deg,var(--green),#009e78);border:none;color:#000;font-weight:700}
.btn-gold{background:linear-gradient(135deg,var(--gold),#e5a800);border:none;color:#000;font-weight:700}
.btn-pur{background:linear-gradient(135deg,rgba(168,85,247,0.2),rgba(168,85,247,0.06));border:1px solid rgba(168,85,247,0.3);color:var(--purple)}
/* Loading screen */
.ld-title{font-family:var(--fhd);font-size:1.2rem;font-weight:900;letter-spacing:4px;
  background:linear-gradient(135deg,#00e5ff,#f0b90b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:18px}
.ld-sub{font-family:var(--fhd);font-size:.46rem;color:rgba(0,229,255,0.4);letter-spacing:4px;margin-top:6px}
.ld-track{width:220px;height:2px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin:20px auto 8px}
#ldf{height:100%;background:linear-gradient(90deg,#00e5ff,#f0b90b);border-radius:2px;width:0%}
/* Scrollbar */
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.15);border-radius:2px}
/* Page animation */
.page.on{animation:pgFade .18s ease}
@keyframes pgFade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
/* Section header */
.sec-hd{
  background:rgba(11,15,26,0.97);
  border-bottom:1px solid rgba(0,229,255,0.08);
  padding:13px 16px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50}
.sec-title{font-family:var(--fhd);font-size:.66rem;font-weight:700;color:var(--a);letter-spacing:2px}
/* Market rows */
.mkt-row{display:flex;align-items:center;gap:11px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:.12s}
.mkt-row:hover{background:rgba(0,229,255,0.025)}
/* Tab bar */
.tab-bar{display:flex;border-bottom:1px solid rgba(0,229,255,0.08);background:rgba(9,13,24,0.95);position:sticky;top:52px;z-index:40}
.tab{flex:1;padding:12px 4px;text-align:center;font-family:var(--fhd);font-size:.5rem;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;letter-spacing:.5px}
.tab.active{color:var(--a);border-bottom-color:var(--a)}
/* Popup/toast */
.toast{border-radius:12px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08)}
/* Home balance */
.home-bal{
  background:linear-gradient(135deg,rgba(0,229,255,0.07),rgba(240,185,11,0.04));

.inp:focus{border-color:rgba(0,229,255,0.3);box-shadow:0 0 0 3px rgba(0,229,255,0.06)}

/* ════════════════════════════════════════
   ZENITHCRYPTO v3 — ADVANCED UI SYSTEM
═══════════════════════════════════════ */

/* Typography imports */
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

/* Full page bg with mesh gradient */
body{
  font-family:'Space Grotesk',sans-serif;
  background:#05080f;
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -5%,rgba(0,229,255,0.06),transparent),
    radial-gradient(ellipse 40% 30% at 90% 90%,rgba(240,185,11,0.04),transparent),
    radial-gradient(ellipse 30% 20% at 10% 80%,rgba(168,85,247,0.03),transparent);
}

/* Topbar - glass */
#topbar{
  background:rgba(5,8,15,0.96);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(0,229,255,0.09);
  box-shadow:0 2px 30px rgba(0,0,0,0.6)}

.tb-brand{
  font-family:Orbitron,monospace;font-size:.74rem;font-weight:800;letter-spacing:3px;
  background:linear-gradient(90deg,#00e5ff 0%,#00ffcc 50%,#f0b90b 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Bottom nav */
#nav{
  background:rgba(5,8,15,0.98);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-top:1px solid rgba(0,229,255,0.07);
  box-shadow:0 -4px 40px rgba(0,0,0,0.7)}

#nav .ni{
  color:rgba(90,110,150,0.7);transition:.2s;gap:3px;
  font-family:Orbitron,monospace;font-size:.4rem;letter-spacing:.5px;
  border-top:2px solid transparent;padding-top:10px}
#nav .ni svg{stroke:currentColor;transition:.25s}
#nav .ni.active{color:var(--a);border-top-color:var(--a)}
#nav .ni.active svg{filter:drop-shadow(0 0 6px rgba(0,229,255,0.5))}

/* Price ticker */
#ticker-wrap{background:rgba(0,229,255,0.02);border-bottom:1px solid rgba(0,229,255,0.05)}
#ticker .ti-s{color:var(--a);font-weight:700}
#ticker .up{color:var(--green)}
#ticker .dn{color:var(--red)}

/* Home hero */
.home-hero{
  padding:16px;
  background:linear-gradient(135deg,rgba(11,15,26,0.9),rgba(5,8,15,1))}
.hh-bal{
  font-family:Orbitron,monospace;font-size:2.6rem;font-weight:900;letter-spacing:-2px;
  background:linear-gradient(135deg,#00e5ff,#f0b90b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;margin:8px 0}
.hh-bal-lbl{font-family:Orbitron,monospace;font-size:.44rem;color:var(--t2);letter-spacing:3px;margin-top:14px}
.hh-cur{font-size:1.4rem}
.hh-zenz{
  font-family:Orbitron,monospace;font-size:.6rem;
  color:var(--gold);background:rgba(240,185,11,0.1);
  border:1px solid rgba(240,185,11,0.2);border-radius:20px;
  padding:4px 12px;display:inline-block;margin-top:4px}
.hh-xp-row{display:flex;justify-content:space-between;font-family:Orbitron,monospace;font-size:.46rem;color:var(--t2);margin:10px 0 4px}
.hh-xpbar{height:3px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.hh-xpbar>div{height:100%;background:linear-gradient(90deg,var(--a),var(--gold));border-radius:3px;transition:width .5s}
.hero-btns{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap}
.hb{display:flex;align-items:center;gap:5px;border:none;border-radius:10px;padding:10px 13px;font-family:Orbitron,monospace;font-size:.54rem;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:.15s;flex:1;min-width:80px;justify-content:center}
.hb:active{transform:scale(0.96)}
.hb-a{background:rgba(0,229,255,0.12);border:1.5px solid rgba(0,229,255,0.3);color:var(--a)}
.hb-gold{background:rgba(240,185,11,0.12);border:1.5px solid rgba(240,185,11,0.3);color:var(--gold)}
.hb-g{background:rgba(0,200,150,0.12);border:1.5px solid rgba(0,200,150,0.3);color:var(--green)}
.hb-pur{background:rgba(168,85,247,0.12);border:1.5px solid rgba(168,85,247,0.3);color:var(--purple)}
.hb-r{background:rgba(255,61,90,0.12);border:1.5px solid rgba(255,61,90,0.3);color:var(--red)}
/* Quick row */
.quick-row{display:flex;overflow-x:auto;gap:10px;padding:12px 16px;scrollbar-width:none}
.quick-row::-webkit-scrollbar{display:none}
.qi{text-align:center;min-width:60px;cursor:pointer}
.qi-ico{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 5px;transition:.15s}
.qi:active .qi-ico{transform:scale(0.9)}
.qi-lbl{font-family:Orbitron,monospace;font-size:.42rem;color:var(--t2);letter-spacing:.5px}

/* Section header */
.sec-hd{
  background:rgba(5,8,15,0.97);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(0,229,255,0.07);
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50}
.sec-title{font-family:Orbitron,monospace;font-size:.6rem;font-weight:700;color:var(--a);letter-spacing:2px}
.sec-more{font-family:Orbitron,monospace;font-size:.48rem;color:var(--t3);cursor:pointer}

/* Tab bar */
.tab-bar{
  display:flex;border-bottom:1px solid rgba(0,229,255,0.07);
  background:rgba(9,13,24,0.97);position:sticky;top:52px;z-index:40;
  overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{
  flex:1;min-width:60px;padding:11px 8px;text-align:center;
  font-family:Orbitron,monospace;font-size:.46rem;color:rgba(90,110,150,0.7);
  cursor:pointer;border-bottom:2px solid transparent;transition:.15s;letter-spacing:.5px;white-space:nowrap}
.tab.active{color:var(--a);border-bottom-color:var(--a)}

/* Chart box */
.chart-box{
  background:linear-gradient(180deg,rgba(11,18,32,0.95),rgba(5,8,15,1));
  height:190px;border:1px solid rgba(0,229,255,0.1);border-radius:14px;
  overflow:hidden;position:relative;margin:8px 10px 6px;
  box-shadow:0 4px 20px rgba(0,0,0,0.4) inset}
.chart-label{
  position:absolute;top:9px;left:12px;z-index:2;pointer-events:none;
  font-family:Orbitron,monospace;font-size:.44rem;
  color:rgba(0,229,255,0.4);letter-spacing:2px}

/* Trade page */
.trade-hero{padding:14px 14px 0;background:rgba(5,8,15,0.9)}
.t-price-big{font-family:Orbitron,monospace;font-size:2.1rem;font-weight:900;letter-spacing:-1px;line-height:1;margin-top:3px}
.t-price-big.up{color:#00c896;text-shadow:0 0 24px rgba(0,200,150,0.5)}
.t-price-big.dn{color:#ff3d5a;text-shadow:0 0 24px rgba(255,61,90,0.5)}
.t-stats{display:flex;gap:12px}
.t-stat label{font-family:Orbitron,monospace;font-size:.4rem;color:var(--t3);display:block;margin-bottom:2px}
.t-stat span{font-family:Orbitron,monospace;font-size:.58rem;font-weight:700}
.o-card{background:var(--s1);border:1px solid rgba(0,229,255,0.07);border-radius:14px;padding:14px;margin:0 10px 10px}
.dir-tabs{display:flex;gap:8px;margin-bottom:14px}
.dir-tab{flex:1;padding:13px;text-align:center;font-family:Orbitron,monospace;font-size:.58rem;font-weight:700;letter-spacing:1px;cursor:pointer;border-radius:10px;transition:.15s;border:1.5px solid rgba(255,255,255,0.05);color:var(--t2)}
.dir-tab.buy.on{background:rgba(0,200,150,0.15);border-color:var(--green);color:var(--green)}
.dir-tab.sell.on{background:rgba(255,61,90,0.15);border-color:var(--red);color:var(--red)}
.f-lbl{font-family:Orbitron,monospace;font-size:.46rem;color:var(--t2);letter-spacing:1px;margin-bottom:6px}
.f-row{position:relative;margin-bottom:10px;display:flex;align-items:center}
.f-inp{flex:1;background:var(--s2)!important;border:1.5px solid rgba(0,229,255,0.1)!important;border-radius:10px!important;font-family:Orbitron,monospace!important;font-size:.9rem!important;color:var(--t1)!important;padding:12px 44px 12px 14px!important;box-sizing:border-box;outline:none!important;transition:.2s;width:100%}
.f-inp:focus{border-color:rgba(0,229,255,0.35)!important;box-shadow:0 0 0 3px rgba(0,229,255,0.06)!important}
.f-unit{position:absolute;right:14px;font-family:Orbitron,monospace;font-size:.5rem;color:var(--t3)}
.pct-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.pct-btn{background:var(--s2);border:1px solid var(--s3);color:var(--t2);border-radius:8px;padding:8px;font-size:.58rem;cursor:pointer;font-family:Orbitron,monospace;transition:.15s}
.pct-btn:hover{background:rgba(0,229,255,0.1);color:var(--a);border-color:var(--a)}
.dur-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.dur-btn{background:var(--s2);border:1px solid var(--s3);color:var(--t2);border-radius:9px;padding:9px 4px;font-family:Orbitron,monospace;font-size:.52rem;cursor:pointer;transition:.15s;text-align:center}
.dur-btn.on{background:rgba(0,229,255,0.12);border-color:var(--a);color:var(--a)}
.t-info-bar{display:flex;justify-content:space-between;padding:9px 12px;background:rgba(19,24,37,0.8);border-radius:10px;margin-bottom:12px;font-size:.58rem;color:var(--t2)}
.t-info-bar b{color:var(--t1);font-family:Orbitron,monospace}
#t-place-btn{
  background:linear-gradient(135deg,#00c896,#009e78)!important;
  box-shadow:0 4px 24px rgba(0,200,150,0.35);border:none!important;
  font-family:Orbitron,monospace!important;letter-spacing:2px;font-size:.66rem!important;
  padding:14px!important}
#t-place-btn:active{transform:scale(0.98)!important}
@keyframes tradePulse{0%,100%{opacity:1}50%{opacity:.4}}
#trade-status{animation:tradePulse 1.5s infinite;font-family:Orbitron,monospace;font-size:.52rem;color:var(--gold);padding:8px 0;text-align:center;letter-spacing:1px}

/* Market rows */
.mkt-row{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.025);cursor:pointer;transition:.1s}
.mkt-row:hover{background:rgba(0,229,255,0.025)}

/* Miner cards */
.miner-card{background:var(--s1);border:1.5px solid rgba(0,229,255,0.08);border-radius:14px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden;transition:.15s}

/* Chat */
.chat-msg{display:flex;gap:8px;padding:5px 0;align-items:flex-start}
.chat-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.68rem;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.07)}
.chat-bub{background:rgba(19,24,37,0.8);border-radius:4px 12px 12px 12px;padding:8px 11px;max-width:82%;border:1px solid rgba(255,255,255,0.04)}
.my-msg{flex-direction:row-reverse}
.my-msg .chat-bub{background:rgba(0,229,255,0.1);border-radius:12px 4px 12px 12px;border-color:rgba(0,229,255,0.15)}
.chat-sender{font-family:Orbitron,monospace;font-size:.42rem;font-weight:700;margin-bottom:3px}
.chat-text{font-size:.7rem;line-height:1.5;color:var(--t1);word-break:break-word}
.chat-time{font-size:.42rem;color:var(--t3);margin-top:4px;text-align:right}

/* Leaderboard */
.lb-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.025);transition:.1s}
.lb-row:hover{background:rgba(0,229,255,0.02)}
.lb-rank{font-family:Orbitron,monospace;font-size:.7rem;font-weight:900;width:28px;text-align:center;flex-shrink:0}
.lb-rank.r1{color:#f0b90b;text-shadow:0 0 10px rgba(240,185,11,0.6)}
.lb-rank.r2{color:#c0c0c0}.lb-rank.r3{color:#cd7f32}
.lb-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.74rem;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.08)}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:.68rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-sub{font-family:Orbitron,monospace;font-size:.48rem;color:var(--t2);margin-top:2px}
.lb-val{font-family:Orbitron,monospace;font-size:.62rem;font-weight:700;color:var(--a);white-space:nowrap;text-align:right}

/* Buttons */
.btn{border-radius:10px;font-family:Orbitron,monospace;letter-spacing:.5px;cursor:pointer;padding:9px 14px;border:none;font-weight:600;transition:.15s}
.btn:active{transform:scale(0.97)}
.btn-c{background:rgba(0,229,255,0.1);border:1.5px solid rgba(0,229,255,0.25);color:var(--a)}
.btn-g{background:linear-gradient(135deg,var(--green),#009e78);color:#000;font-weight:700}
.btn-gold,.btn-gold{background:linear-gradient(135deg,var(--gold),#e5a800);color:#000;font-weight:700}
.btn-pur{background:rgba(168,85,247,0.1);border:1.5px solid rgba(168,85,247,0.25);color:var(--purple)}
.btn-r{background:rgba(255,61,90,0.1);border:1.5px solid rgba(255,61,90,0.25);color:var(--red)}
.btn-ghost{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:var(--t1)}
.btn-sm{padding:6px 10px;font-size:.52rem}
.btn-blk{width:100%;display:block;text-align:center;margin-bottom:8px}
.claim-btn{width:calc(100% - 28px);margin:8px 14px;background:linear-gradient(135deg,var(--gold),#e5a800);color:#000;border:none;border-radius:12px;padding:13px;font-family:Orbitron,monospace;font-size:.62rem;font-weight:900;cursor:pointer;letter-spacing:1px}

/* Input fields */
.inp{background:var(--s2);border:1.5px solid rgba(0,229,255,0.1);border-radius:10px;color:var(--t1);padding:10px 14px;font-size:.78rem;outline:none;transition:.2s;width:100%;box-sizing:border-box;font-family:'Space Grotesk',sans-serif}
.inp:focus{border-color:rgba(0,229,255,0.3);box-shadow:0 0 0 3px rgba(0,229,255,0.06)}

/* Cards */
.card{background:var(--s1);border:1px solid rgba(0,229,255,0.07);border-radius:14px;padding:14px;margin-bottom:10px}
.card-pur{border-color:rgba(168,85,247,0.2)}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:.64rem}
.info-lbl{color:var(--t2)}

/* Scrollbar */
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.15);border-radius:2px}

/* Page transition */
.page.on{animation:pgIn .18s ease}
@keyframes pgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Loading */
#ld{background:radial-gradient(ellipse 100% 60% at 50% -10%,rgba(0,229,255,0.08),transparent 60%),#05080f}
.ld-hex{animation:ldPulse 2s ease-in-out infinite}
@keyframes ldPulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 10px rgba(0,229,255,0.3))}50%{transform:scale(1.04);filter:drop-shadow(0 0 20px rgba(0,229,255,0.6))}}
.ld-title{font-family:Orbitron,monospace;font-size:1.1rem;font-weight:900;letter-spacing:5px;background:linear-gradient(135deg,#00e5ff,#f0b90b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:18px}
.ld-sub{font-family:Orbitron,monospace;font-size:.42rem;color:rgba(0,229,255,0.35);letter-spacing:4px;margin-top:6px}
.ld-track{width:220px;height:2px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;margin:20px auto 6px}
#ldf{height:100%;background:linear-gradient(90deg,#00e5ff,#f0b90b);border-radius:2px;width:0%}

/* Spin wheel */
#spin-cv{filter:drop-shadow(0 0 16px rgba(0,229,255,0.2))}
#spin-btn{box-shadow:0 4px 20px rgba(240,185,11,0.3)!important}

/* Auth */
.auth-logo{display:flex;justify-content:center;margin-bottom:16px}

/* empty state */
.empty{text-align:center;padding:30px;color:var(--t3);font-size:.64rem;font-family:Orbitron,monospace}

/* Toasts/popups */
.toast,.ov-popup{border-radius:14px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}

/* Chart canvas fix */
#trade-chart-canvas, #trade-cv {
  width: 100% !important;
  display: block;
}
.chart-box canvas {
  width: 100% !important;
  height: 190px !important;
}

/* Mine page hero */
.mine-hero {
  background: linear-gradient(135deg, rgba(0,229,255,0.04), rgba(0,200,150,0.02));
  border-bottom: 1px solid rgba(0,229,255,0.07);
  padding: 16px;
}
#mine-rate {
  font-family: 'Orbitron', monospace;
  font-size: 1.5rem;
  font-weight: 900;
  color: var(--green);
  text-shadow: 0 0 20px rgba(0,200,150,0.3);
  margin: 4px 0;
}
.mine-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-top: 12px;
}
.msb {
  background: rgba(0,229,255,0.04);
  border: 1px solid rgba(0,229,255,0.08);
  border-radius: 10px;
  padding: 9px;
  text-align: center;
}
.msb-v {
  font-family: 'Orbitron', monospace;
  font-size: .66rem;
  font-weight: 700;
  color: var(--a);
}
.msb-l {
  font-family: 'Orbitron', monospace;
  font-size: .4rem;
  color: var(--t3);
  margin-top: 3px;
  letter-spacing: 1px;
}
.mine-prog-track {
  height: 3px;
  background: rgba(255,255,255,0.05);
  border-radius: 3px;
  margin-top: 12px;
  overflow: hidden;
}
#mine-prog {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--a));
  border-radius: 3px;
  transition: width .5s;
  width: 0%;
}

/* Boost page hero fix */
.boost-hero {
  border-bottom: 1px solid rgba(0,229,255,0.07);
}

/* Social page */
.social-input-row {
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  background: rgba(5,8,15,0.97);
  border-top: 1px solid rgba(0,229,255,0.07);
  position: sticky;
  bottom: 70px;
}

/* Trade big price color flash */
@keyframes priceFlash {
  0% { opacity: 1; }
  30% { opacity: 0.5; }
  100% { opacity: 1; }
}
.price-flash { animation: priceFlash 0.3s ease; }

/* Popup / toast upgrade */
.ov-popup {
  background: rgba(11,15,26,0.98) !important;
  border: 1px solid rgba(0,229,255,0.12) !important;
  border-radius: 16px !important;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8) !important;
}

/* Notification toast */
.toast {
  background: rgba(11,15,26,0.97) !important;
  border-left: 3px solid var(--a) !important;
  box-shadow: 0 8px 30px rgba(0,0,0,0.6) !important;
}
.toast.s { border-left-color: var(--green) !important; }
.toast.e { border-left-color: var(--red) !important; }
.toast.w { border-left-color: var(--gold) !important; }

/* Loading bar glow */
#ldf { box-shadow: 0 0 8px rgba(0,229,255,0.5); }

/* Auth page */
.auth-wrap {
  background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(0,229,255,0.06), transparent 60%), var(--bg);
  min-height: 100vh;
}
.auth-card {
  background: rgba(11,15,26,0.9);
  border: 1px solid rgba(0,229,255,0.1);
  border-radius: 20px;
  backdrop-filter: blur(20px);
  box-shadow: 0 24px 80px rgba(0,0,0,0.8);
}
.auth-title {
  font-family: 'Orbitron', monospace;
  font-size: 1.1rem;
  font-weight: 900;
  letter-spacing: 3px;
